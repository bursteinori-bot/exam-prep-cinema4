<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="dark" data-font="classic" data-style="glass">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תולדות הקולנוע - הכנה למבחן</title>
  <style>
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-bold-webfont.ttf') format('truetype'); font-weight:700; }
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-light-webfont.ttf') format('truetype'); font-weight:300; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:400; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:600 700; }

    /* ── Theme variables ── */
    :root {
      --bg:#F2F1EE; --surface:#FFF; --inset:#F7F6F3;
      --border:#E5E4E0; --text:#1C1B19; --muted:#8E8D8A;
      --faint:#C4C3BF; --green:#1A7A52; --green-bg:#E8F5EE; --blue:#1560A8;
      --header-bg:rgba(255,255,255,.92);
      --shadow:0 2px 8px rgba(0,0,0,.08),0 0 0 .5px rgba(0,0,0,.04);
      --days-bg:#1C1B19; --days-text:#FFF;
      --gold:#C4A84A; --gold-dark:#A08840;
      --danger:#EB5757; --danger-bg:rgba(235,87,87,.09); --danger-border:rgba(235,87,87,.27);
    }
    [data-theme="dark"] {
      --bg:#141413; --surface:#1E1D1B; --inset:#252420;
      --border:#333230; --text:#E8E6E0; --muted:#8A8880;
      --faint:#4A4845; --green:#2EBD76; --green-bg:#0D2B1E; --blue:#4B94D8;
      --header-bg:rgba(20,20,19,.92);
      --days-bg:#E8E6E0; --days-text:#1C1B19;
      --shadow:0 2px 12px rgba(0,0,0,.32),0 0 0 .5px rgba(0,0,0,.22);
    }

    /* ── Liquid Glass style (toggle, additive only) ── */
    [data-style="glass"] {
      --glass-bg:rgba(255,255,255,.55);
      --glass-bg-strong:rgba(255,255,255,.74);
      --glass-border:rgba(255,255,255,.6);
      --glass-blur:18px; --glass-sat:160%;
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,.30),rgba(255,255,255,0) 45%);
      --bevel:inset 1px 1px 1px rgba(255,255,255,.6),inset -1px -1px 1px rgba(0,0,0,.08);
      --bevel-active:inset -1px -1px 1px rgba(255,255,255,.4),inset 1px 1px 2px rgba(0,0,0,.15);
      --green-glass-tint:rgba(26,122,82,.16);
      --bg-grad-a:rgba(196,168,74,.10); --bg-grad-b:rgba(21,96,168,.07); --bg-grad-c:rgba(26,122,82,.05);
      --shadow:0 2px 8px rgba(0,0,0,.08),0 8px 20px rgba(0,0,0,.05),inset 0 1px 0 rgba(255,255,255,.5),inset 0 -1px 1px rgba(0,0,0,.04);
    }
    [data-style="glass"][data-theme="dark"] {
      --glass-bg:rgba(36,35,32,.50);
      --glass-bg-strong:rgba(30,29,27,.80);
      --glass-border:rgba(255,255,255,.10);
      --glass-blur:20px; --glass-sat:140%;
      --glass-shine:linear-gradient(135deg,rgba(255,255,255,.08),rgba(255,255,255,0) 45%);
      --bevel:inset 1px 1px 1px rgba(255,255,255,.08),inset -1px -1px 1px rgba(0,0,0,.4);
      --bevel-active:inset -1px -1px 1px rgba(0,0,0,.05),inset 1px 1px 2px rgba(0,0,0,.5);
      --green-glass-tint:rgba(46,189,118,.14);
      --bg-grad-a:rgba(196,168,74,.07); --bg-grad-b:rgba(75,148,216,.10); --bg-grad-c:rgba(46,189,118,.05);
      --shadow:0 2px 12px rgba(0,0,0,.32),0 10px 24px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.06),inset 0 -1px 1px rgba(0,0,0,.3);
    }
    [data-style="glass"] body {
      background:
        radial-gradient(ellipse 900px 600px at 12% -10%, var(--bg-grad-a), transparent 60%),
        radial-gradient(ellipse 800px 700px at 110% 20%, var(--bg-grad-b), transparent 55%),
        radial-gradient(ellipse 1000px 800px at 50% 120%, var(--bg-grad-c), transparent 60%),
        var(--bg);
      background-attachment:fixed;
    }
    [data-style="glass"] .sec-box,
    [data-style="glass"] .fl-item,
    [data-style="glass"] .ov-row {
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      border:.5px solid var(--glass-border);
      position:relative;
    }
    [data-style="glass"] .ov-row { overflow:hidden; }
    [data-style="glass"] .sheet,
    [data-style="glass"] .nav-sheet {
      background:var(--glass-bg-strong);
      backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      box-shadow:0 -4px 32px rgba(0,0,0,.18),0 -1px 0 rgba(0,0,0,.06),inset 0 1px 0 rgba(255,255,255,.4),inset 0 -1px 2px rgba(0,0,0,.05);
    }
    [data-style="glass"][data-theme="dark"] .sheet,
    [data-style="glass"][data-theme="dark"] .nav-sheet {
      box-shadow:0 -4px 32px rgba(0,0,0,.4),0 -1px 0 rgba(0,0,0,.2),inset 0 1px 0 rgba(255,255,255,.07),inset 0 -1px 2px rgba(0,0,0,.2);
    }
    [data-style="glass"] .settings-btn,
    [data-style="glass"] .mark-all-btn,
    [data-style="glass"] .fl-filter,
    [data-style="glass"] .set-opt,
    [data-style="glass"] .lesson-home-btn {
      background:var(--glass-bg);
      backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      -webkit-backdrop-filter:blur(var(--glass-blur)) saturate(var(--glass-sat));
      box-shadow:var(--bevel);
    }
    [data-style="glass"] .settings-btn:active,
    [data-style="glass"] .mark-all-btn:active,
    [data-style="glass"] .fl-filter:active,
    [data-style="glass"] .set-opt:active,
    [data-style="glass"] .lesson-home-btn:active {
      box-shadow:var(--bevel-active);
      transform:translateY(.5px);
    }
    [data-style="glass"] .fl-check {
      background:var(--glass-bg);
      box-shadow:var(--bevel);
    }
    [data-style="glass"] .fl-check:active { box-shadow:var(--bevel-active); }
    [data-style="glass"] .sec-box::before,
    [data-style="glass"] .fl-item::before,
    [data-style="glass"] .ov-row::before,
    [data-style="glass"] .sheet::before,
    [data-style="glass"] .nav-sheet::before {
      content:''; position:absolute; inset:0; border-radius:inherit;
      background:var(--glass-shine); pointer-events:none; z-index:0;
    }
    [data-style="glass"] .sec-box > *,
    [data-style="glass"] .fl-item > *,
    [data-style="glass"] .ov-row > *,
    [data-style="glass"] .sheet > *,
    [data-style="glass"] .nav-sheet > * { position:relative; z-index:1; }
    [data-style="glass"] .fl-item.watched,
    [data-style="glass"] .ov-row.done {
      background:linear-gradient(var(--green-glass-tint),var(--green-glass-tint)),var(--glass-bg);
    }

    /* ── Font stacks ── */
    [data-font="classic"] {
      --f-body:"Yehuda","Baskerville",Georgia,serif;
      --f-head:"Yehuda","Hoefler Text",Georgia,serif;
      --f-mono:"Courier New",monospace;
    }
    [data-font="modern"] {
      --f-body:-apple-system,"Segoe UI",Arial,sans-serif;
      --f-head:-apple-system,"Segoe UI",Arial,sans-serif;
      --f-mono:"SF Mono","Fira Code","Courier New",monospace;
    }
    [data-font="elegant"] {
      --f-body:"Palatino","Hoefler Text",Georgia,serif;
      --f-head:"Hoefler Text",Palatino,Georgia,serif;
      --f-mono:"Courier New",monospace;
    }

    html { font-size:36px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--f-body); direction:rtl; -webkit-font-smoothing:antialiased; transition:background .2s,color .2s; }

    /* ── Header ── */
    header { background:var(--header-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:.5px solid var(--border); padding:10px 16px 0; position:sticky; top:0; z-index:200; }
    .header-top { display:flex; align-items:center; gap:10px; padding-bottom:8px; }
    .header-icons { display:flex; align-items:center; gap:2px; background:var(--inset); border-radius:14px; padding:3px; flex-shrink:0; }
    .header-icons .settings-btn { width:34px; height:34px; border:none; background:transparent; border-radius:10px; }
    .header-icons .settings-btn:hover { background:var(--surface); }
    .settings-btn.toc-btn { display:none; }

    header h1 { font-family:var(--f-head); font-size:.85rem; font-weight:600; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Days badge */
    .days-badge { display:flex; flex-direction:column; align-items:center; background:var(--days-bg); color:var(--days-text); border-radius:999px; padding:4px 10px; min-width:44px; flex-shrink:0; }
    .days-badge .num { font-family:var(--f-mono); font-size:.72rem; font-weight:700; line-height:1; }
    .days-badge .lbl { font-size:.38rem; letter-spacing:.04em; opacity:.7; margin-top:1px; }

    /* Progress */
    .progress-pill { display:flex; align-items:center; gap:6px; }
    .progress-track { width:48px; height:4px; background:var(--border); border-radius:3px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .35s; }
    .progress-pct { font-size:.58rem; font-weight:600; color:var(--text); min-width:26px; font-family:var(--f-mono); }

    /* Settings btn */
    .settings-btn { width:40px; height:40px; border-radius:12px; border:.5px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; font-size:.75rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s; }
    .settings-btn:hover { background:var(--inset); }

    /* Tab bar */
    .tab-bar { display:flex; overflow-x:auto; scrollbar-width:none; gap:0; margin:0 -16px; padding:0 12px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; padding:6px 10px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.62rem; font-family:var(--f-body); cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; margin-bottom:-.5px; text-align:right; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }
    .tab-btn .tab-num { display:block; font-size:.44rem; color:var(--faint); font-family:var(--f-mono); margin-bottom:1px; }
    .tab-btn.active .tab-num { color:var(--muted); }
    .tab-btn .tab-title { display:block; }
    .tab-btn .tab-frac { font-size:.44rem; color:var(--faint); }
    .tab-btn.active .tab-frac { color:var(--muted); }
    .tab-divider { width:1px; background:var(--border); margin:5px 3px; flex-shrink:0; }
    .tab-sem-label { font-size:.5rem; color:var(--faint); padding:0 4px; align-self:center; flex-shrink:0; white-space:nowrap; }
    .tab-btn.sem-a .tab-num { color:var(--gold); }
    .tab-btn.sem-a.active { color:var(--gold-dark); border-bottom-color:var(--gold-dark); }

    /* Nav sheet */
    .nav-sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:26px 26px 0 0; box-shadow:0 -4px 24px rgba(0,0,0,.18); z-index:302; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .nav-sheet.open { transform:translateY(0); }
    .ns-header { padding:12px 16px 8px; font-family:var(--f-head); font-size:.75rem; font-weight:700; border-bottom:.5px solid var(--border); }
    .ns-item { display:flex; align-items:center; padding:10px 16px; border-bottom:.5px solid var(--border); cursor:pointer; transition:background .1s; min-height:48px; gap:8px; }
    .ns-item:hover, .ns-item.active { background:var(--inset); }
    .ns-item-num { font-size:.5rem; color:var(--faint); font-family:var(--f-mono); min-width:24px; flex-shrink:0; }
    .ns-item-title { font-size:.66rem; color:var(--text); line-height:1.3; flex:1; }
    .ns-item.active .ns-item-title { font-weight:600; }
    .ns-item-frac { font-size:.54rem; color:var(--muted); white-space:nowrap; font-family:var(--f-mono); }
    .ns-item.sem-a .ns-item-title { color:var(--gold-dark); }

    /* Main */
    main { max-width:100%; padding:16px 12px 32px; }
    .panel { display:none; } .panel.active { display:block; }

    /* Lesson header */
    .lesson-hd { display:flex; align-items:flex-start; justify-content:space-between; gap:10px; margin-bottom:14px; }
    .lesson-hd-info { flex:1; min-width:0; }
    .lesson-hd .l-num { font-size:.54rem; color:var(--faint); font-family:var(--f-mono); letter-spacing:.06em; margin-bottom:2px; }
    .lesson-hd h2 { font-family:var(--f-head); font-size:1rem; font-weight:600; color:var(--text); line-height:1.3; }
    .lesson-hd .l-frac { font-size:.58rem; color:var(--muted); margin-top:3px; font-family:var(--f-mono); }
    .lesson-hd .l-frac b { color:var(--text); }
    .lesson-subtitle { font-size:.62rem; color:var(--gold-dark); margin-top:2px; margin-bottom:10px; }
    .lesson-home-btn { flex-shrink:0; width:36px; height:36px; border-radius:11px; border:.5px solid var(--border); background:var(--surface); color:var(--text); font-size:.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    .lesson-home-btn:hover { background:var(--inset); }

    /* Section boxes */
    .sec-box { background:var(--surface); border-radius:16px; box-shadow:var(--shadow); margin-top:12px; overflow:hidden; }
    .sec-box-hd { display:flex; align-items:center; justify-content:space-between; padding:9px 13px 8px; border-bottom:.5px solid var(--border); }
    .sec-box-hd h3 { font-family:var(--f-head); font-size:.7rem; font-weight:700; color:var(--text); }
    .sec-box-body { padding:9px 12px; }

    /* Clips */
    .fc-clip-row { display:flex; align-items:flex-start; gap:5px; }
    .fc-clip-box { width:14px; height:14px; min-width:14px; margin-top:2px; border-radius:4px; border:1.5px solid var(--faint); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.44rem; color:#fff; transition:background .1s,border-color .1s; flex-shrink:0; }
    .fc-clip-box:hover { border-color:var(--text); }
    .fc-clip-row.done .fc-clip-box { background:var(--text); border-color:var(--text); }
    .fc-clip-txt { font-size:.56rem; color:var(--muted); line-height:1.4; }
    .fc-clip-row.done .fc-clip-txt { color:var(--faint); text-decoration:line-through; }

    /* Film list rows (compact, for lesson pages) */
    .fl-list { display:flex; flex-direction:column; gap:6px; }
    .fl-item { background:var(--surface); border-radius:14px; box-shadow:var(--shadow); overflow:hidden; transition:box-shadow .15s; }
    .fl-item:hover { box-shadow:0 4px 14px rgba(0,0,0,.1); }
    .fl-item.watched { background:var(--green-bg); }
    .fl-row { display:flex; align-items:center; gap:8px; padding:9px 13px; min-height:40px; }
    .fl-check { width:28px; height:28px; min-width:28px; border-radius:50%; border:1.5px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.52rem; color:#fff; transition:background .15s,border-color .15s; flex-shrink:0; }
    .fl-check:hover { border-color:var(--green); }
    .fl-item.watched .fl-check { background:var(--green); border-color:var(--green); }
    .fl-main { flex:1; min-width:0; }
    .fl-title { font-family:var(--f-head); font-size:.68rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .fl-item.watched .fl-title { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint); }
    .fl-meta { font-family:var(--f-mono); font-size:.46rem; color:var(--faint); margin-top:1px; }
    .fl-type { font-size:.44rem; font-weight:600; padding:1px 6px; border-radius:20px; flex-shrink:0; white-space:nowrap; }
    .fl-type.mandatory { background:rgba(21,96,168,.12); color:var(--blue); }
    .fl-type.clip { background:rgba(128,128,128,.1); color:var(--muted); }
    .fl-clips { padding:4px 43px 8px 13px; display:flex; flex-direction:column; gap:3px; border-top:.5px solid var(--border); }
    @media(max-width:820px) { .fl-check { font-size:.6rem; } .fl-clips { padding-right:49px; } }

    /* Overview rows */
    .ov-list { display:flex; flex-direction:column; gap:7px; }
    .ov-row { display:flex; align-items:center; gap:8px; background:var(--surface); border-radius:14px; padding:10px 14px; box-shadow:var(--shadow); cursor:pointer; min-height:42px; transition:box-shadow .15s,transform .15s; }
    .ov-row:hover { box-shadow:0 4px 16px rgba(0,0,0,.12); transform:translateY(-1px); }
    .ov-row-bar { width:4px; min-height:24px; border-radius:4px; background:var(--border); flex-shrink:0; overflow:hidden; position:relative; }
    .ov-row-bar-fill { position:absolute; bottom:0; left:0; right:0; background:var(--text); transition:height .3s; }
    .ov-row-bar-fill.full { background:var(--green); }
    .ov-row-num { font-size:.48rem; color:var(--faint); font-family:var(--f-mono); flex-shrink:0; min-width:24px; }
    .ov-row-title { font-family:var(--f-head); font-size:.66rem; font-weight:600; color:var(--text); flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ov-row-frac { font-size:.52rem; color:var(--muted); font-family:var(--f-mono); flex-shrink:0; min-width:32px; text-align:left; }
    .ov-row-frac.full { color:var(--green); }
    .ov-row.sem-a { border-right:2px solid var(--gold); }
    /* Mark all */
    .mark-all-btn { font-size:.52rem; padding:4px 12px; border-radius:10px; border:.5px solid var(--border); background:var(--inset); color:var(--muted); cursor:pointer; font-family:var(--f-body); transition:background .12s,color .12s; white-space:nowrap; flex-shrink:0; }
    .mark-all-btn:hover { background:var(--text); color:var(--bg); }
    /* Confetti */
    @keyframes confetti-fly { 0%{transform:translate(0,0) rotate(0deg);opacity:1;} 100%{transform:translate(var(--cx),var(--cy)) rotate(var(--cr));opacity:0;} }
    .confetti-p { position:fixed; pointer-events:none; z-index:600; border-radius:2px; animation:confetti-fly .9s ease-out forwards; }

    /* Reading Panel */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.2); z-index:299; opacity:0; pointer-events:none; transition:opacity .25s; }
    .backdrop.open { opacity:1; pointer-events:auto; }
    .sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:26px 26px 0 0; box-shadow:0 -4px 32px rgba(0,0,0,.18); z-index:300; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .sheet.open { transform:translateY(0); }
    .sheet-tall { height:84vh; }
    .sheet-auto { max-height:60vh; overflow-y:auto; }
    .sheet-hd { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; border-bottom:.5px solid var(--border); flex-shrink:0; }
    .sheet-title { font-family:var(--f-head); font-size:.76rem; font-weight:700; color:var(--text); }
    .sheet-close { width:28px; height:28px; border-radius:50%; border:none; background:var(--inset); color:var(--muted); cursor:pointer; font-size:.65rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sheet-body { flex:1; overflow-y:auto; padding:14px 18px 36px; direction:rtl; }
    .sheet-body::-webkit-scrollbar { width:3px; }
    .sheet-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .rp-date { font-family:var(--f-mono); font-size:.52rem; color:var(--muted); margin-bottom:10px; }
    .rp-heading { font-size:.68rem; font-weight:700; color:var(--text); margin-top:13px; margin-bottom:2px; }
    .rp-para { font-size:.62rem; line-height:1.75; color:var(--text); margin-bottom:4px; direction:rtl; }
    .rp-para.bold { font-weight:700; margin-top:9px; margin-bottom:1px; }
    .rp-list { padding-right:13px; margin-bottom:5px; }
    .rp-li { font-size:.6rem; line-height:1.7; color:var(--text); margin-bottom:2px; direction:rtl; }

    /* Settings panel */
    .settings-body { padding:16px; }
    .set-section { margin-bottom:18px; }
    .set-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
    .set-row { display:flex; gap:8px; flex-wrap:wrap; }
    .set-opt { padding:9px 16px; border-radius:12px; border:.5px solid var(--border); background:var(--inset); font-size:.65rem; font-family:var(--f-body); color:var(--text); cursor:pointer; transition:background .15s,color .15s,border-color .15s; }
    .set-opt:hover { border-color:var(--text); }
    .set-opt.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    [data-theme="dark"] .set-opt.active { background:#3A3935; color:var(--text); border-color:var(--faint); }

    /* Scroll to top */
    .scroll-top { position:fixed; bottom:72px; left:14px; width:36px; height:36px; border-radius:50%; background:var(--surface); border:.5px solid var(--border); box-shadow:var(--shadow); color:var(--text); font-size:.65rem; cursor:pointer; display:flex; align-items:center; justify-content:center; z-index:150; opacity:0; pointer-events:none; transition:opacity .2s; }
    .scroll-top.visible { opacity:1; pointer-events:auto; }
    /* Done row */
    .ov-row.done { background:var(--green-bg); }
    .ov-row.done .ov-row-title { color:var(--green); }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:var(--bg); border-radius:20px; padding:11px 20px; font-size:.6rem; line-height:1.5; z-index:500; opacity:0; transition:opacity .25s,transform .25s; max-width:88vw; text-align:center; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Mobile */
    @media(max-width:820px) {
      .tab-bar { display:none; }
      .settings-btn.toc-btn { display:flex; }
      .sheet-tall { height:92vh; }
      .fc-clip-box { width:18px; height:18px; min-width:18px; font-size:.52rem; }
      .header-top { flex-wrap:wrap; }
      header h1 { order:-1; flex:1 1 100%; white-space:normal; overflow:visible; text-overflow:clip; font-size:.95rem; margin-bottom:6px; }
    }
    @media(max-width:480px) { html { font-size:22px; } header { padding:8px 12px 0; } main { padding:12px 10px 20px; } }
    @media(max-width:360px) { html { font-size:19px; } }

    /* Overview search */
    .ov-search-wrap { margin-bottom:10px; }
    .ov-search { width:100%; padding:8px 14px; border-radius:12px; border:.5px solid var(--border); background:var(--surface); color:var(--text); font-size:.65rem; font-family:var(--f-body); direction:rtl; outline:none; box-shadow:var(--shadow); transition:border-color .15s; appearance:none; -webkit-appearance:none; }
    .ov-search:focus { border-color:var(--text); }
    .ov-search::placeholder { color:var(--muted); }
    /* Film filters */
    .fl-filter-bar { display:flex; gap:4px; margin-bottom:8px; }
    .fl-filter { font-size:.46rem; padding:3px 9px; border-radius:20px; border:.5px solid var(--border); background:transparent; color:var(--muted); cursor:pointer; font-family:var(--f-body); transition:background .12s,color .12s,border-color .12s; }
    .fl-filter.active { background:var(--text); color:var(--bg); border-color:var(--text); }
    [data-theme="dark"] .fl-filter.active { background:var(--faint); color:var(--text); border-color:var(--faint); }
    /* Reset danger */
    .set-danger { color:var(--danger) !important; border-color:var(--danger-border) !important; }
    .set-danger:hover { background:var(--danger-bg) !important; }
    .set-danger.confirm { background:var(--danger) !important; color:#fff !important; border-color:var(--danger) !important; }
  </style>
</head>

function showJoke(filmId) {
  const list = JOKES[filmId];
  if (!list) return;
  const msg = list[Math.floor(Math.random()*list.length)];
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4500);
}

function confetti(el) {
  const r = el.getBoundingClientRect();
  const cx = r.left + r.width/2, cy = r.top + r.height/2;
  const colors = ['#F2C94C','#27AE60','#2D9CDB','#EB5757','#BB6BD9','#F2994A'];
  for(let i=0;i<22;i++){
    const p=document.createElement('div'); p.className='confetti-p';
    const size=Math.random()*6+4;
    p.style.cssText=`left:${cx}px;top:${cy}px;width:${size}px;height:${size}px;background:${colors[i%colors.length]};--cx:${(Math.random()-0.5)*130}px;--cy:${-Math.random()*100-20}px;--cr:${Math.random()*360}deg;animation-delay:${Math.random()*0.15}s`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1200);
  }
}

// ── Progress ──────────────────────────────────────────
const mandatory = l => l.films.filter(f => f.mandatory);
const watchedCount = l => mandatory(l).filter(f => fs(f.id).watched).length;
const pctOf = (w,t) => t ? Math.round(w/t*100) : 0;
function overallPct() {
  const all = LESSONS.flatMap(mandatory);
  return pctOf(all.filter(f => fs(f.id).watched).length, all.length);
}
function refreshProgress() {
  const p = overallPct();
  document.getElementById('overall-bar').style.width = p+'%';
  document.getElementById('overall-pct').textContent = p+'%';
  LESSONS.forEach(l => {
    const w=watchedCount(l), t=mandatory(l).length;
    const frac = document.querySelector(`.tab-frac[data-l="${l.id}"]`);
    if (frac) frac.textContent = t ? `${w}/${t}` : '';
    const row=document.querySelector(`.ov-row[data-l="${l.id}"]`);
    if(row){
      const p2=pctOf(w,t);
      const fill=row.querySelector('.ov-row-bar-fill'), fracEl=row.querySelector('.ov-row-frac');
      if(fill){fill.style.height=p2+'%'; fill.className='ov-row-bar-fill'+(p2===100?' full':'');}
      if(fracEl){fracEl.textContent=t?`${w}/${t}`:''; fracEl.className='ov-row-frac'+(p2===100?' full':'');}
      row.classList.toggle('done', p2===100);
    }
  });
}

// ── Markdown renderer ─────────────────────────────────
function renderMd(text, container) {
  let ul=null;
  text.split('\n').forEach(line => {
    if (!line.trim()){ul=null;return;}
    if (line.startsWith('### ')){const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(4);container.appendChild(el);ul=null;}
    else if (/^\*\*[^*]+\*\*$/.test(line)){const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(2,-2);container.appendChild(el);ul=null;}
    else if (line.startsWith('- ')){if(!ul){ul=document.createElement('ul');ul.className='rp-list';container.appendChild(ul);}const li=document.createElement('li');li.className='rp-li';li.innerHTML=line.slice(2).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');ul.appendChild(li);}
    else{const el=document.createElement('div');el.className='rp-para';el.innerHTML=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');container.appendChild(el);ul=null;}
  });
}

// ── Tabs ──────────────────────────────────────────────
let active='overview';
function setTab(id) {
  active=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.p===id));
  document.querySelectorAll('.ns-item').forEach(it=>it.classList.toggle('active',it.dataset.t===id));
  closeNavSheet();
}

function buildNavSheet() {
  const list=document.getElementById('ns-list'); list.innerHTML='';
  const mkItem=(t,num,title,frac,cls='')=>{
    const div=document.createElement('div');
    div.className='ns-item'+(active===t?' active':'')+(cls?' '+cls:''); div.dataset.t=t;
    div.innerHTML=`<span class="ns-item-num">${num}</span><span class="ns-item-title">${title}</span>${frac?`<span class="ns-item-frac">${frac}</span>`:''}`;
    div.onclick=()=>setTab(t); list.appendChild(div);
  };
  mkItem('overview','','סקירה כללית','');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkItem(`l${l.id}`,l.id,l.title,'','sem-a'));
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    const pct=pctOf(w,t); mkItem(`l${l.id}`,l.id,l.title,t?`${w}/${t} · ${pct}%`:'');
  });
}

function buildTabs() {
  const bar=document.getElementById('tab-bar');
  const mkBtn=(t,num,title,frac='',cls='')=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(t==='overview'?' active':'')+(cls?' '+cls:'');
    b.dataset.t=t;
    b.innerHTML=`<span class="tab-num">${num}</span><span class="tab-title">${title}</span>${frac?`<br><span class="tab-frac" data-l="${num}">${frac}</span>`:''}`;
    b.onclick=()=>setTab(t); bar.appendChild(b);
  };
  const mkD=()=>{const d=document.createElement('div');d.className='tab-divider';bar.appendChild(d);};
  const mkL=txt=>{const s=document.createElement('span');s.className='tab-sem-label';s.textContent=txt;bar.appendChild(s);};
  mkBtn('overview','','סקירה');
  mkD(); mkL('סמ׳ א');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkBtn(`l${l.id}`,l.id,l.title,'','sem-a'));
  mkD(); mkL('סמ׳ ב');
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    mkBtn(`l${l.id}`,l.id,l.title,t?`${w}/${t}`:'');
  });
}

// ── Overview ──────────────────────────────────────────
function buildOverview() {
  const panel=document.createElement('div'); panel.className='panel active'; panel.dataset.p='overview';
  const sw=document.createElement('div'); sw.className='ov-search-wrap';
  const si=document.createElement('input'); si.type='search'; si.className='ov-search'; si.placeholder='חפש נושא או במאי...'; si.dir='rtl';
  sw.appendChild(si); panel.appendChild(sw);
  const list=document.createElement('div'); list.className='ov-list';

  LESSONS.filter(l=>l.semester==='א').forEach(l=>{
    const row=document.createElement('div'); row.className='ov-row sem-a'; row.dataset.l=l.id;
    row.innerHTML=`<div class="ov-row-num">א${l.id.replace('א','')}</div><div class="ov-row-title">${l.title}</div>`;
    row.onclick=()=>setTab(`l${l.id}`); list.appendChild(row);
  });

  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length,p=pctOf(w,t);
    const dirs=[...new Set(mandatory(l).map(f=>f.director).filter(Boolean))].join(' · ');
    const row=document.createElement('div'); row.className='ov-row'; row.dataset.l=l.id;
    if(p===100) row.classList.add('done');
    row.innerHTML=`<div class="ov-row-bar"><div class="ov-row-bar-fill${p===100?' full':''}" style="height:${p}%"></div></div><div class="ov-row-num">${l.id}</div><div class="ov-row-title">${l.title}</div><div class="ov-row-frac${p===100?' full':''}${!t?' hidden':''}">${t?`${w}/${t}`:''}</div>`;
    row.onclick=()=>setTab(`l${l.id}`); list.appendChild(row);
  });

  si.addEventListener('input',()=>{
    const q=si.value.trim().toLowerCase();
    list.querySelectorAll('.ov-row').forEach(row=>{
      const title=row.querySelector('.ov-row-title')?.textContent.toLowerCase()||'';
      row.style.display=(!q||title.includes(q))?'':'none';
    });
  });

  panel.appendChild(list); return panel;
}

// ── Lesson panel ──────────────────────────────────────
const HAGAR_MAP={1:['1'],2:['2','3'],3:['4','5'],4:['6','7'],5:[],6:['9'],7:['10','11']};
function getHagarParas(lid){return(HAGAR_MAP[lid]||[]).flatMap(k=>(SUMMARIES[k]||[]).slice(1));}

function buildLesson(l) {
  const panel=document.createElement('div'); panel.className='panel'; panel.dataset.p=`l${l.id}`;
  const w=watchedCount(l),t=mandatory(l).length;
  const totalMins=mandatory(l).reduce((s,f)=>s+(f.duration||0),0);
  const durStr=totalMins?` · ~${Math.floor(totalMins/60)}שע${totalMins%60?' '+totalMins%60+'ד':''}` :'';
  const hd=document.createElement('div'); hd.className='lesson-hd';
  hd.innerHTML=`<div class="lesson-hd-info"><div class="l-num">נושא ${l.id}${l.semester?' · סמ׳ א':''}</div><h2>${l.title}</h2>${t?`<div class="l-frac"><b>${w}</b> / ${t} נצפו${durStr}</div>`:''}</div><button class="lesson-home-btn" onclick="setTab('overview')" title="חזרה לעמוד הבית"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M4 11.5 12 4l8 7.5"/><path d="M6 10v9a1 1 0 0 0 1 1h3v-5h4v5h3a1 1 0 0 0 1-1v-9"/></svg></button>`;
  panel.appendChild(hd);
  if(l.subtitle){const s=document.createElement('div');s.className='lesson-subtitle';s.textContent=l.subtitle;panel.appendChild(s);}

  const mandatoryFilms=l.films.filter(f=>f.mandatory);
  const clipFilms=l.films.filter(f=>!f.mandatory);

  function buildSection(title, films) {
    if(!films.length) return;
    const box=document.createElement('div'); box.className='sec-box';
    const hd=document.createElement('div'); hd.className='sec-box-hd';
    const h3=document.createElement('h3'); h3.textContent=title; hd.appendChild(h3);
    const list=document.createElement('div'); list.className='fl-list';
    const applyFilter=(mode)=>{
      list.querySelectorAll('.fl-item').forEach(item=>{
        const show=mode==='all'||(mode==='watched'&&item.classList.contains('watched'))||(mode==='unwatched'&&!item.classList.contains('watched'));
        item.style.display=show?'':'none';
      });
    };
    let activeFilter='all';
    if(films[0]?.mandatory && films.length>1){
      const markBtn=document.createElement('button'); markBtn.className='mark-all-btn';
      const updateBtn=()=>{ markBtn.textContent=films.every(f=>fs(f.id).watched)?'בטל הכל ✕':'סמן הכל ✓'; };
      updateBtn();
      markBtn.onclick=()=>{
        const allWatched=films.every(f=>fs(f.id).watched);
        films.forEach(f=>{fs(f.id).watched=!allWatched;}); save();
        list.innerHTML=''; films.forEach(film=>buildFilmRow(film,list,panel,l));
        activeFilter='all';
        body.querySelectorAll('.fl-filter').forEach((b,j)=>b.classList.toggle('active',j===0));
        applyFilter('all');
        refreshProgress(); updateBtn();
      };
      hd.appendChild(markBtn);
    }
    box.appendChild(hd);
    const body=document.createElement('div'); body.className='sec-box-body';
    if(films.length>1){
      const fb=document.createElement('div'); fb.className='fl-filter-bar';
      ['הכל','לא נצפו','נצפו'].forEach((label,i)=>{
        const modes=['all','unwatched','watched'];
        const btn=document.createElement('button'); btn.className='fl-filter'+(i===0?' active':''); btn.textContent=label;
        btn.onclick=()=>{ activeFilter=modes[i]; fb.querySelectorAll('.fl-filter').forEach((b,j)=>b.classList.toggle('active',j===i)); applyFilter(modes[i]); };
        fb.appendChild(btn);
      });
      body.appendChild(fb);
    }
    films.forEach(film=>buildFilmRow(film,list,panel,l));
    body.appendChild(list); box.appendChild(body); panel.appendChild(box);
  }

  buildSection('סרטי חובה', mandatoryFilms);
  buildSection('קטעים שהוקרנו בכיתה', clipFilms);
  return panel;
}

// ── Film row (compact list) ────────────────────────────
function buildFilmRow(film, list, panel, l) {
  const s=fs(film.id);
  const item=document.createElement('div'); item.className='fl-item'+(s.watched?' watched':'');
  const row=document.createElement('div'); row.className='fl-row';
  const check=document.createElement('button'); check.className='fl-check'; check.textContent=s.watched?'✓':'';
  const main=document.createElement('div'); main.className='fl-main';
  const titleEl=document.createElement('div'); titleEl.className='fl-title'; titleEl.textContent=film.title;
  if(s.watched){titleEl.style.textDecoration='line-through';titleEl.style.color='var(--muted)';}
  const meta=[film.director,film.year,film.duration?film.duration+"′":null].filter(Boolean).join(' · ');
  main.appendChild(titleEl);
  if(meta){const m=document.createElement('div');m.className='fl-meta';m.textContent=meta;main.appendChild(m);}
  const typeEl=document.createElement('span'); typeEl.className='fl-type '+(film.mandatory?'mandatory':'clip');
  typeEl.textContent=film.mandatory?'חובה':'קטע';
  row.appendChild(check); row.appendChild(main); row.appendChild(typeEl); item.appendChild(row);
  if(film.clips.length){
    const cd=document.createElement('div'); cd.className='fl-clips';
    film.clips.forEach((clip,i)=>{
      const cr=document.createElement('div'); cr.className='fc-clip-row'+(s.clips[i]?' done':'');
      const cb=document.createElement('button'); cb.className='fc-clip-box'; cb.textContent=s.clips[i]?'✓':'';
      cb.onclick=()=>{const s2=fs(film.id);s2.clips[i]=!s2.clips[i];save();cr.classList.toggle('done',!!s2.clips[i]);cb.textContent=s2.clips[i]?'✓':'';};
      const ct=document.createElement('span'); ct.className='fc-clip-txt'; ct.textContent=clip;
      cr.appendChild(cb); cr.appendChild(ct); cd.appendChild(cr);
    }); item.appendChild(cd);
  }
  check.onclick=()=>{
    const s2=fs(film.id); s2.watched=!s2.watched; save();
    item.classList.toggle('watched',s2.watched); check.textContent=s2.watched?'✓':'';
    titleEl.style.textDecoration=s2.watched?'line-through':''; titleEl.style.color=s2.watched?'var(--muted)':'';
    const frac=panel.querySelector('.l-frac');
    if(frac){const ww=watchedCount(l),tt=mandatory(l).length;frac.innerHTML=`<b>${ww}</b> / ${tt} נצפו`;}
    refreshProgress();
    if(s2.watched) { showJoke(film.id); confetti(check); }
  };
  list.appendChild(item);
}

// ── Init ──────────────────────────────────────────────
buildTabs(); buildNavSheet();
const main=document.getElementById('main');
main.appendChild(buildOverview());
LESSONS.forEach(l=>main.appendChild(buildLesson(l)));
refreshProgress();
