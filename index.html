<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light" data-font="yehuda">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תולדות הקולנוע 4 - הכנה למבחן</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-bold-webfont.ttf') format('truetype'); font-weight:700; }
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-light-webfont.ttf') format('truetype'); font-weight:300; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:400; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:600 700; }

    /* ── Themes ── */
    :root {
      --bg:#F4F3EF; --surface:#FFFFFF; --surface2:#FAFAF7; --inset:#F0EFE9;
      --border:#E2E1DC; --border2:#D0CFC8; --text:#1A1916; --muted:#7A7973;
      --faint:#B8B7B1; --green:#1A7A52; --green-bg:#E6F5EE;
      --blue:#1458A0; --gold:#8A6A00; --gold-bg:#FDF8EC;
      --accent:#1A1916; --shadow:rgba(0,0,0,.08);
      --transit: .22s ease;
    }
    [data-theme="dark"] {
      --bg:#111110; --surface:#1C1C1A; --surface2:#222220; --inset:#252523;
      --border:#2E2E2B; --border2:#3A3A36; --text:#E8E6DF; --muted:#8A8980;
      --faint:#4A4A46; --green:#2A9A65; --green-bg:#0E2318;
      --blue:#4A8FD4; --gold:#C8A830; --gold-bg:#1C1A0A;
      --accent:#E8E6DF; --shadow:rgba(0,0,0,.3);
    }

    /* ── Font stacks ── */
    [data-font="yehuda"] { font-family:"Yehuda","Baskerville",Georgia,serif; }
    [data-font="gill"]   { font-family:"Gill Sans","Gill Sans MT",Optima,sans-serif; }
    [data-font="play"]   { font-family:"Playfair Display",Georgia,serif; }
    [data-font="modern"] { font-family:-apple-system,"Helvetica Neue",Arial,sans-serif; }

    html { font-size:20px; scroll-behavior:smooth; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); min-height:100vh; direction:rtl; -webkit-font-smoothing:antialiased; transition:background var(--transit),color var(--transit); }

    /* ── Header ── */
    header {
      background:var(--surface);
      border-bottom:.5px solid var(--border);
      padding:10px 18px 0;
      position:sticky; top:0; z-index:200;
      transition:background var(--transit),border-color var(--transit);
    }
    .header-top { display:flex; align-items:center; gap:10px; padding-bottom:8px; }

    header h1 {
      font-size:.95rem; font-weight:700; color:var(--text);
      flex:1; line-height:1.2;
    }

    /* Countdown badge */
    .countdown-badge {
      display:flex; flex-direction:column; align-items:center;
      background:var(--text); color:var(--bg);
      border-radius:10px; padding:4px 10px; flex-shrink:0;
      transition:background var(--transit),color var(--transit);
    }
    .countdown-badge .days-num {
      font-size:1.2rem; font-weight:700; line-height:1;
      font-variant-numeric:tabular-nums;
    }
    .countdown-badge .days-label { font-size:.42rem; opacity:.75; letter-spacing:.04em; margin-top:1px; }

    /* Settings button */
    .settings-btn {
      width:34px; height:34px; border-radius:8px; border:.5px solid var(--border);
      background:var(--surface2); cursor:pointer; display:flex; align-items:center;
      justify-content:center; flex-shrink:0; transition:background var(--transit),border-color var(--transit);
    }
    .settings-btn:hover { background:var(--inset); border-color:var(--border2); }
    .settings-btn svg { width:16px; height:16px; stroke:var(--muted); fill:none; stroke-width:1.8; stroke-linecap:round; }

    /* Progress in header */
    .header-progress { display:flex; align-items:center; gap:6px; }
    .progress-track { width:52px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .4s ease,background var(--transit); }
    .progress-pct { font-size:.6rem; font-weight:700; color:var(--text); min-width:26px; }

    /* ── Settings panel ── */
    .settings-panel {
      position:fixed; top:0; left:0; right:0; bottom:0; z-index:400;
      display:flex; align-items:flex-start; justify-content:flex-start;
      pointer-events:none;
    }
    .settings-panel.open { pointer-events:auto; }
    .settings-backdrop { position:absolute; inset:0; background:rgba(0,0,0,.25); opacity:0; transition:opacity .2s; }
    .settings-panel.open .settings-backdrop { opacity:1; }
    .settings-drawer {
      position:relative; width:min(300px,85vw); height:100vh;
      background:var(--surface); border-left:.5px solid var(--border);
      padding:20px 18px; transform:translateX(-100%); transition:transform .28s cubic-bezier(.32,.72,0,1);
      overflow-y:auto; display:flex; flex-direction:column; gap:20px;
    }
    [dir="rtl"] .settings-drawer { border-left:none; border-right:.5px solid var(--border); transform:translateX(100%); left:auto; right:0; }
    .settings-panel.open .settings-drawer { transform:translateX(0); }

    .settings-drawer h3 { font-size:.78rem; font-weight:700; color:var(--text); margin-bottom:4px; }
    .s-section { display:flex; flex-direction:column; gap:8px; }
    .s-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); }

    /* Toggle switch */
    .toggle-row { display:flex; align-items:center; justify-content:space-between; }
    .toggle-row span { font-size:.72rem; color:var(--text); }
    .toggle {
      width:42px; height:24px; border-radius:12px; background:var(--border);
      border:none; cursor:pointer; position:relative; transition:background .2s; flex-shrink:0;
    }
    .toggle.on { background:var(--text); }
    .toggle::after {
      content:''; position:absolute; width:18px; height:18px; border-radius:50%;
      background:var(--surface); top:3px; right:3px; transition:transform .2s;
    }
    [data-theme="dark"] .toggle::after { background:var(--bg); }
    .toggle.on::after { transform:translateX(-18px); }
    [dir="rtl"] .toggle.on::after { transform:translateX(18px); }

    /* Font picker */
    .font-grid { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
    .font-btn {
      padding:8px; border-radius:8px; border:.5px solid var(--border);
      background:var(--inset); cursor:pointer; font-size:.68rem; color:var(--text);
      transition:background .15s,border-color .15s; text-align:center;
    }
    .font-btn:hover { background:var(--border); }
    .font-btn.active { border-color:var(--text); background:var(--text); color:var(--bg); }
    .font-btn span { display:block; font-size:1rem; font-weight:600; margin-bottom:2px; }

    /* ── Tab bar ── */
    .tab-bar { display:flex; overflow-x:auto; scrollbar-width:none; gap:0; margin:0 -18px; padding:0 14px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; padding:6px 10px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.68rem; font-family:inherit; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; margin-bottom:-.5px; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }
    .tab-frac { font-size:.55rem; color:var(--faint); margin-right:2px; }
    .tab-btn.active .tab-frac { color:var(--muted); }
    .tab-divider { width:1px; background:var(--border); margin:5px 3px; flex-shrink:0; }
    .tab-sem-label { font-size:.52rem; color:var(--faint); padding:0 4px; align-self:center; flex-shrink:0; }
    .tab-btn.sem-a { color:var(--gold); }
    .tab-btn.sem-a.active { border-bottom-color:var(--gold); }

    /* Mobile nav bar */
    .mob-nav { display:none; align-items:center; border-top:.5px solid var(--border); }
    .mob-menu-btn { padding:9px 13px; background:none; border:none; border-left:.5px solid var(--border); font-size:.85rem; cursor:pointer; color:var(--muted); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }
    [dir="rtl"] .mob-menu-btn { border-left:none; border-right:.5px solid var(--border); }
    .mob-nav-label { flex:1; padding:9px 13px; overflow:hidden; }
    .mob-nav-title { font-size:.72rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mob-nav-sub { font-size:.56rem; color:var(--muted); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

    /* Nav sheet */
    .nav-sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 24px var(--shadow); z-index:302; max-height:82vh; overflow-y:auto; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .nav-sheet.open { transform:translateY(0); }
    .ns-header { padding:14px 18px 10px; font-size:.78rem; font-weight:700; border-bottom:.5px solid var(--border); color:var(--text); }
    .ns-item { padding:11px 18px; border-bottom:.5px solid var(--border); cursor:pointer; transition:background .1s; min-height:52px; display:flex; align-items:center; justify-content:space-between; }
    .ns-item:hover, .ns-item.active { background:var(--inset); }
    .ns-item-title { font-size:.75rem; font-weight:700; color:var(--text); }
    .ns-item-num { font-size:.58rem; color:var(--faint); }
    .ns-item-frac { font-size:.6rem; color:var(--muted); flex-shrink:0; }
    .ns-item.sem-a .ns-item-title { color:var(--gold); }

    /* ── Main ── */
    main { max-width:100%; padding:16px 14px 48px; }
    .panel { display:none; } .panel.active { display:block; }

    /* ── Lesson header ── */
    .lesson-hd { margin-bottom:14px; }
    .lesson-hd-top { display:flex; align-items:baseline; gap:10px; margin-bottom:3px; }
    .lesson-hd h2 { font-size:1.05rem; font-weight:700; color:var(--text); line-height:1.25; flex:1; }
    .lesson-num-badge { font-size:.55rem; color:var(--muted); font-weight:400; flex-shrink:0; }
    .lesson-frac { font-size:.62rem; color:var(--muted); }
    .lesson-frac b { color:var(--text); font-weight:700; }
    .lesson-subtitle { font-size:.62rem; color:var(--muted); margin-top:2px; }

    /* ── Section box ── */
    .sec-box { background:var(--surface); border-radius:12px; box-shadow:0 1px 4px var(--shadow),0 0 0 .5px rgba(0,0,0,.04); margin-top:14px; overflow:hidden; transition:background var(--transit); }
    .sec-box-hd { display:flex; align-items:center; justify-content:space-between; padding:9px 13px; border-bottom:.5px solid var(--border); }
    .sec-box-hd h3 { font-size:.72rem; font-weight:700; color:var(--text); }
    .sec-box-body { padding:10px 12px; }

    /* ── Film grid ── */
    .film-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; align-items:start; }
    @media(max-width:820px) { .film-grid { grid-template-columns:1fr !important; gap:6px; } }

    /* ── Film card ── */
    .fc { background:var(--surface2); border-radius:10px; border:.5px solid var(--border); padding:9px 10px 8px; display:flex; flex-direction:column; transition:background var(--transit),border-color var(--transit); }
    .fc.watched { background:var(--green-bg); border-color:rgba(26,122,82,.25); }
    .fc.sem-a-card { background:var(--surface2); }

    .fc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:5px; gap:5px; }
    .fc-check { width:16px; height:16px; min-width:16px; border-radius:50%; border:1.5px solid var(--border2); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.48rem; color:#fff; transition:background .15s,border-color .15s; flex-shrink:0; margin-top:1px; }
    .fc-check:hover { border-color:var(--green); }
    .fc.watched .fc-check { background:var(--green); border-color:var(--green); }
    .fc-type { font-size:.5rem; font-weight:600; letter-spacing:.03em; padding:1px 5px; border-radius:20px; flex-shrink:0; }
    .fc-type.mandatory { background:rgba(20,88,160,.1); color:var(--blue); }
    .fc-type.clip { background:rgba(0,0,0,.06); color:var(--muted); }
    [data-theme="dark"] .fc-type.clip { background:rgba(255,255,255,.06); }

    .fc-title { font-size:.68rem; font-weight:600; color:var(--text); line-height:1.3; }
    .fc.watched .fc-title { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint); }
    .fc-meta { font-family:"Courier New",monospace; font-size:.5rem; color:var(--faint); margin-top:2px; }

    .fc-clips { margin-top:6px; border-top:.5px solid var(--border); padding-top:5px; display:flex; flex-direction:column; gap:3px; }
    .fc-clip-row { display:flex; align-items:flex-start; gap:5px; }
    .fc-clip-box { width:11px; height:11px; min-width:11px; margin-top:2px; border-radius:2px; border:1.5px solid var(--faint); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.45rem; color:var(--bg); transition:background .1s,border-color .1s; flex-shrink:0; }
    .fc-clip-box:hover { border-color:var(--text); }
    .fc-clip-row.done .fc-clip-box { background:var(--text); border-color:var(--text); }
    .fc-clip-txt { font-size:.58rem; color:var(--muted); line-height:1.45; }
    .fc-clip-row.done .fc-clip-txt { color:var(--faint); text-decoration:line-through; }

    /* ── Wit toast ── */
    .wit-toast {
      position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px);
      background:var(--text); color:var(--bg); padding:10px 18px; border-radius:22px;
      font-size:.7rem; max-width:min(320px,88vw); text-align:center;
      box-shadow:0 4px 20px rgba(0,0,0,.25); z-index:500; line-height:1.45;
      transition:transform .3s cubic-bezier(.32,.72,0,1), opacity .3s;
      opacity:0; pointer-events:none;
    }
    .wit-toast.show { transform:translateX(-50%) translateY(0); opacity:1; }

    /* ── Overview ── */
    .ov-header { margin-bottom:16px; }
    .ov-header h2 { font-size:1rem; font-weight:700; color:var(--text); margin-bottom:2px; }
    .ov-header p { font-size:.62rem; color:var(--muted); }

    .ov-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; align-items:stretch; }
    @media(max-width:900px) { .ov-grid { grid-template-columns:repeat(4,1fr); } }
    @media(max-width:820px) { .ov-grid { grid-template-columns:1fr !important; gap:6px; } }

    .ov-card { background:var(--surface); border-radius:12px; padding:12px 13px; border:.5px solid var(--border); cursor:pointer; transition:box-shadow .15s,background var(--transit),border-color var(--transit); display:flex; flex-direction:column; gap:6px; }
    .ov-card:hover { box-shadow:0 3px 12px var(--shadow); }
    .ov-card.sem-a { background:var(--gold-bg); border-color:rgba(138,106,0,.2); }

    .ov-num { font-size:.52rem; color:var(--faint); letter-spacing:.04em; }
    .ov-title { font-size:.75rem; font-weight:700; color:var(--text); line-height:1.3; }
    .ov-card.sem-a .ov-title { color:var(--gold); }
    .ov-directors { font-size:.58rem; color:var(--muted); line-height:1.5; }

    .ov-prog-row { display:flex; align-items:center; gap:6px; }
    .ov-track { flex:1; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
    .ov-fill { height:100%; background:var(--text); border-radius:2px; transition:width .3s,background var(--transit); }
    .ov-fill.full { background:var(--green); }
    .ov-frac { font-size:.58rem; color:var(--muted); white-space:nowrap; }
    .ov-frac.full { color:var(--green); }
    .ov-films { display:flex; flex-wrap:wrap; gap:3px; }
    .ov-film-tag { font-size:.52rem; font-weight:600; color:var(--text); background:var(--inset); border:.5px solid var(--border); border-radius:4px; padding:2px 6px; white-space:nowrap; }
    .ov-film-done { color:var(--faint); background:transparent; text-decoration:line-through; }

    /* ── Reading Panel ── */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.2); z-index:299; opacity:0; pointer-events:none; transition:opacity .25s; }
    .backdrop.open { opacity:1; pointer-events:auto; }
    .reading-panel { position:fixed; bottom:0; right:0; left:0; height:82vh; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 32px var(--shadow); z-index:300; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1),background var(--transit); }
    .reading-panel.open { transform:translateY(0); }
    .rp-header { display:flex; align-items:center; justify-content:space-between; padding:13px 18px 10px; border-bottom:.5px solid var(--border); flex-shrink:0; }
    .rp-title { font-size:.82rem; font-weight:700; color:var(--text); line-height:1.3; }
    .rp-close { width:28px; height:28px; border-radius:50%; border:none; background:var(--inset); color:var(--muted); cursor:pointer; font-size:.68rem; display:flex; align-items:center; justify-content:center; }
    .rp-body { flex:1; overflow-y:auto; padding:16px 20px 36px; direction:rtl; }
    .rp-date { font-family:"Courier New",monospace; font-size:.54rem; color:var(--muted); margin-bottom:12px; }
    .rp-heading { font-size:.75rem; font-weight:700; color:var(--text); margin-top:14px; margin-bottom:3px; }
    .rp-para { font-size:.68rem; line-height:1.78; color:var(--text); margin-bottom:5px; }
    .rp-para.bold { font-weight:700; margin-top:10px; }
    .rp-list { padding-right:14px; margin-bottom:6px; }
    .rp-li { font-size:.66rem; line-height:1.72; color:var(--text); margin-bottom:2px; }

    /* ── Mobile ── */
    @media(max-width:820px) {
      html { font-size:16px; }
      .tab-bar { display:none; }
      .mob-nav { display:flex; }
      .reading-panel { height:91vh; }
      .header-top { gap:8px; }
      header h1 { font-size:.88rem; }
      .settings-drawer { width:100vw; border-radius:18px 18px 0 0; height:auto; max-height:80vh; position:fixed; bottom:0; top:auto; transform:translateY(100%); }
      [dir="rtl"] .settings-drawer { border-right:none; border-top:.5px solid var(--border); }
      .settings-panel.open .settings-drawer { transform:translateY(0); }
      main { padding:12px 10px 44px; }
    }
  </style>
</head>
<body>

<!-- Settings Panel -->
<div class="settings-panel" id="settings-panel">
  <div class="settings-backdrop" id="settings-backdrop"></div>
  <div class="settings-drawer">
    <div class="s-section">
      <div class="s-label">מצב תצוגה</div>
      <div class="toggle-row">
        <span id="theme-label">בהיר</span>
        <button class="toggle" id="theme-toggle" onclick="toggleTheme()"></button>
      </div>
    </div>
    <div class="s-section">
      <div class="s-label">פונט</div>
      <div class="font-grid">
        <button class="font-btn active" data-font="yehuda" onclick="setFont('yehuda')"><span style="font-family:'Yehuda',serif">יהודה</span>Yehuda</button>
        <button class="font-btn" data-font="gill" onclick="setFont('gill')"><span style="font-family:'Gill Sans',sans-serif">גיל</span>Gill Sans</button>
        <button class="font-btn" data-font="play" onclick="setFont('play')"><span style="font-family:'Playfair Display',serif">פליי</span>Playfair</button>
        <button class="font-btn" data-font="modern" onclick="setFont('modern')"><span style="font-family:-apple-system,sans-serif">מודרן</span>Modern</button>
      </div>
    </div>
  </div>
</div>

<header>
  <div class="header-top">
    <button class="settings-btn" id="settings-btn" onclick="openSettings()" title="הגדרות">
      <svg viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><circle cx="8" cy="6" r="2" fill="var(--surface)"/><line x1="3" y1="12" x2="21" y2="12"/><circle cx="16" cy="12" r="2" fill="var(--surface)"/><line x1="3" y1="18" x2="21" y2="18"/><circle cx="10" cy="18" r="2" fill="var(--surface)"/></svg>
    </button>
    <h1>תולדות הקולנוע 4</h1>
    <div class="header-progress">
      <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
      <span class="progress-pct" id="overall-pct">0%</span>
    </div>
    <div class="countdown-badge">
      <span class="days-num" id="cd-days">–</span>
      <span class="days-label">ימים · 26.7</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="mob-nav" id="mob-nav">
    <button class="mob-menu-btn" id="mob-menu-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
    </button>
    <div class="mob-nav-label">
      <div class="mob-nav-title" id="mob-nav-title">סקירה</div>
      <div class="mob-nav-sub" id="mob-nav-sub"></div>
    </div>
  </div>
</header>

<div class="backdrop" id="backdrop"></div>
<div class="reading-panel" id="reading-panel">
  <div class="rp-header">
    <span class="rp-title" id="rp-title"></span>
    <button class="rp-close" id="rp-close">✕</button>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<div class="backdrop" id="nav-backdrop" style="z-index:301"></div>
<div class="nav-sheet" id="nav-sheet">
  <div class="ns-header">בחר נושא</div>
  <div id="ns-list"></div>
</div>

<div class="wit-toast" id="wit-toast"></div>

<main id="main"></main>

<script src="data.js"></script>
<script src="summaries.js"></script>
<script src="notion_summaries.js"></script>
<script>
// ── Witty comments per mandatory film ────────────────
const WITTY = {
  avventura:    "ל'אוונטורה: אנה נעלמה, הסרט ממשיך, ואתה סיימת לצפות. גדולים.",
  blowup:       "יצרים: הגדלת. גם תומאס הגדיל. שניכם לא בטוחים מה ראיתם.",
  dolcevita:    "לה דולצ'ה ויטה: 170 דקות של פליני ✓. החיים אכן מתוקים.",
  '8half':      "8½ — בדיוק כמה פעמים תפרוש מהמבחן בחלומות הלילה שלך.",
  fourhundred:  "400 הלקות: קיבלת. ניתן להמשיך לסרט הבא.",
  breathless:   "À bout de souffle — בדיוק כמו אחרי 90 דקות גודאר.",
  pierrot:      "פיירו פוצץ את עצמו בסוף. אתה סימנת V. ניצחת.",
  hiroshima:    "ראית הכל בהירושימה. לא ראית כלום. הסרט מסכים.",
  cleo:         "קליאו ממתינה לתוצאות. גם אתה. בהצלחה לשניכם.",
  umbrellas:    "מטריות שרבורג — כולם מתגייסים, רק ג'נב'ייב בוכה. ואתה?",
  lola_demy:    "לולה: קאבוט חזר. גם סיימת. הכל מסתדר.",
  ashes:        "אפר ויהלומים: מאצ'ק ירה ומת. האחוז עלה. אחד מהישגים.",
  iam_cuba:     "אני קובה — שני שוטים אחד מהמרהיבים בקולנוע. ✓ מגיע.",
  rublev:       "208 דקות. פעמון נולד. אתה סיימת. גיבור של ממש.",
  come_see:     "בוא וראה — ראית. מה שלא יסור מהראש לפחות עוזר במבחן.",
  trains:       "רכבות נשמרות היטב. הסימון שלך — פחות.",
  wr:           "ו.ר.: הנאום על החופש המיני — ספוק. מסומן. קדימה.",
};

// ── State ────────────────────────────────────────────
const SK = 'cinema4_v1';
function load() { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } }
function save() { localStorage.setItem(SK, JSON.stringify(ST)); }
let ST = load();
function fs(id) {
  if (!ST.films) ST.films={};
  if (!ST.films[id]) ST.films[id]={watched:false,clips:{}};
  return ST.films[id];
}

// ── Settings ─────────────────────────────────────────
const PREF_KEY = 'cinema4_prefs';
function loadPrefs() { try { return JSON.parse(localStorage.getItem(PREF_KEY))||{}; } catch { return {}; } }
function savePrefs(p) { localStorage.setItem(PREF_KEY, JSON.stringify(p)); }

function applyTheme(t) {
  document.documentElement.dataset.theme = t;
  const tog = document.getElementById('theme-toggle');
  const lbl = document.getElementById('theme-label');
  if (tog) tog.classList.toggle('on', t==='dark');
  if (lbl) lbl.textContent = t==='dark' ? 'כהה' : 'בהיר';
}
function toggleTheme() {
  const cur = document.documentElement.dataset.theme;
  const next = cur==='dark'?'light':'dark';
  applyTheme(next);
  const p=loadPrefs(); p.theme=next; savePrefs(p);
}
function setFont(f) {
  document.documentElement.dataset.font = f;
  document.querySelectorAll('.font-btn').forEach(b=>b.classList.toggle('active',b.dataset.font===f));
  const p=loadPrefs(); p.font=f; savePrefs(p);
}

function openSettings() { document.getElementById('settings-panel').classList.add('open'); }
function closeSettings() { document.getElementById('settings-panel').classList.remove('open'); }
document.getElementById('settings-backdrop').onclick = closeSettings;

// Init prefs
(()=>{
  const p=loadPrefs();
  if (p.theme) applyTheme(p.theme); else applyTheme('light');
  if (p.font) setFont(p.font);
})();

// ── Countdown ────────────────────────────────────────
const DAYS_LEFT = Math.max(0, Math.ceil((EXAM_DATE-new Date())/86400000));
document.getElementById('cd-days').textContent = DAYS_LEFT;

// ── Progress ─────────────────────────────────────────
const mandatory = l => l.films.filter(f=>f.mandatory);
const watchedCount = l => mandatory(l).filter(f=>fs(f.id).watched).length;
const pctOf = (w,t) => t?Math.round(w/t*100):0;
function overallPct() {
  const all=LESSONS.flatMap(mandatory);
  return pctOf(all.filter(f=>fs(f.id).watched).length, all.length);
}
function refreshProgress() {
  const p=overallPct();
  document.getElementById('overall-bar').style.width=p+'%';
  document.getElementById('overall-pct').textContent=p+'%';
  LESSONS.forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    const frac=document.querySelector(`.tab-frac[data-l="${l.id}"]`);
    if(frac) frac.textContent=t?` ${w}/${t}`:'';
    const card=document.querySelector(`.ov-card[data-l="${l.id}"]`);
    if(card){
      const p2=pctOf(w,t);
      const fill=card.querySelector('.ov-fill'), fracEl=card.querySelector('.ov-frac');
      if(fill){fill.style.width=p2+'%';fill.className='ov-fill'+(p2===100?' full':'');}
      if(fracEl){fracEl.textContent=`${w} / ${t}`;fracEl.className='ov-frac'+(p2===100?' full':'');}
      card.querySelectorAll('.ov-film-tag').forEach(el=>{
        const id=el.dataset.fid; if(id) el.className='ov-film-tag'+(fs(id).watched?' ov-film-done':'');
      });
    }
  });
}

// ── Wit toast ────────────────────────────────────────
function showWit(filmId) {
  const msg = WITTY[filmId];
  if (!msg) return;
  const t=document.getElementById('wit-toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 3800);
}

// ── Markdown renderer ────────────────────────────────
function renderMd(text, container) {
  let ul=null;
  text.split('\n').forEach(line=>{
    if(!line.trim()){ul=null;return;}
    if(line.startsWith('### ')){
      const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(4);container.appendChild(el);ul=null;
    } else if(/^\*\*[^*]+\*\*$/.test(line)){
      const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(2,-2);container.appendChild(el);ul=null;
    } else if(line.startsWith('- ')){
      if(!ul){ul=document.createElement('ul');ul.className='rp-list';container.appendChild(ul);}
      const li=document.createElement('li');li.className='rp-li';li.innerHTML=line.slice(2).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');ul.appendChild(li);
    } else {
      const el=document.createElement('div');el.className='rp-para';el.innerHTML=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');container.appendChild(el);ul=null;
    }
  });
}

// ── Reading Panel ────────────────────────────────────
const rpanel=document.getElementById('reading-panel'),backdrop=document.getElementById('backdrop');
const rpTitle=document.getElementById('rp-title'),rpBody=document.getElementById('rp-body');
function openRP(title,buildFn){rpTitle.textContent=title;rpBody.innerHTML='';buildFn(rpBody);rpanel.classList.add('open');backdrop.classList.add('open');}
function closeRP(){rpanel.classList.remove('open');backdrop.classList.remove('open');}
document.getElementById('rp-close').onclick=closeRP;
backdrop.onclick=closeRP;
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeRP();closeNavSheet();closeSettings();}});

// ── הגר mapping ──────────────────────────────────────
const HAGAR_MAP={1:['1'],2:['2','3'],3:['4','5'],4:['6','7'],5:[],6:['9'],7:['10','11']};
function getHagarParas(lid){
  return (HAGAR_MAP[lid]||[]).flatMap(k=>(SUMMARIES[k]||[]).slice(1));
}

// ── Tabs ─────────────────────────────────────────────
let active='overview';
function setTab(id){
  active=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.p===id));
  document.querySelectorAll('.ns-item').forEach(it=>it.classList.toggle('active',it.dataset.t===id));
  const l=LESSONS.find(l=>`l${l.id}`===id);
  document.getElementById('mob-nav-title').textContent = id==='overview'?'סקירה כללית':(l?l.title:'');
  document.getElementById('mob-nav-sub').textContent = l?(l.semester?`נושא ${l.id}`:`נושא ${l.id}`):'';
  closeNavSheet();
}

function buildTabs(){
  const bar=document.getElementById('tab-bar');
  const mk=(t,l,e='',cls='')=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(t==='overview'?' active':'')+(cls?' '+cls:'');
    b.dataset.t=t; b.innerHTML=l+e; b.onclick=()=>setTab(t); bar.appendChild(b);
  };
  const mkD=()=>{const d=document.createElement('div');d.className='tab-divider';bar.appendChild(d);};
  const mkL=txt=>{const s=document.createElement('span');s.className='tab-sem-label';s.textContent=txt;bar.appendChild(s);};
  mk('overview','סקירה');
  mkD();mkL('סמ׳ א');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mk(`l${l.id}`,l.id,'','sem-a'));
  mkD();mkL('סמ׳ ב');
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    mk(`l${l.id}`,`${l.id}`,t?`<span class="tab-frac" data-l="${l.id}"> ${w}/${t}</span>`:'');
  });
}

// ── Nav sheet ────────────────────────────────────────
const navSheet=document.getElementById('nav-sheet'),navBackdrop=document.getElementById('nav-backdrop');
function openNavSheet(){navSheet.classList.add('open');navBackdrop.classList.add('open');}
function closeNavSheet(){navSheet.classList.remove('open');navBackdrop.classList.remove('open');}
document.getElementById('mob-menu-btn').onclick=openNavSheet;
navBackdrop.onclick=closeNavSheet;

function buildNavSheet(){
  const list=document.getElementById('ns-list');list.innerHTML='';
  const mk=(t,title,num,cls='')=>{
    const div=document.createElement('div');
    div.className='ns-item'+(active===t?' active':'')+(cls?' '+cls:'');div.dataset.t=t;
    div.innerHTML=`<div><div class="ns-item-title">${title}</div>${num?`<div class="ns-item-num">${num}</div>`:''}</div>`;
    div.onclick=()=>setTab(t);list.appendChild(div);
  };
  mk('overview','סקירה כללית','');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mk(`l${l.id}`,l.title,`נושא ${l.id}`,'sem-a'));
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    const div=document.createElement('div');
    div.className='ns-item'+(active===`l${l.id}`?' active':'');div.dataset.t=`l${l.id}`;
    div.innerHTML=`<div><div class="ns-item-title">${l.title}</div><div class="ns-item-num">נושא ${l.id}</div></div>${t?`<span class="ns-item-frac">${w}/${t}</span>`:''}`;
    div.onclick=()=>setTab(`l${l.id}`);list.appendChild(div);
  });
}

// ── Overview ─────────────────────────────────────────
function buildOverview(){
  const panel=document.createElement('div');panel.className='panel active';panel.dataset.p='overview';
  const allM=LESSONS.flatMap(mandatory).length;
  panel.innerHTML=`<div class="ov-header"><h2>הכנה למבחן</h2><p>${allM} נושאי חובה · מבחן ב-26.7 · ${DAYS_LEFT} ימים</p></div>`;
  const grid=document.createElement('div');grid.className='ov-grid';
  const decade={1:'1960',2:'1959-63',3:'1959-65',4:'1959-64',5:'1958-64',6:'1972-85',7:'1966-71'};

  // Semester A cards
  LESSONS.filter(l=>l.semester==='א').forEach(l=>{
    const card=document.createElement('div');card.className='ov-card sem-a';card.dataset.l=l.id;
    // Get unique directors
    const dirs=[...new Set(l.films.map(f=>f.director).filter(Boolean))].slice(0,6).join(' · ');
    card.innerHTML=`<div class="ov-num">נושא ${l.id} · סמ׳ א</div><div class="ov-title">${l.title}</div><div class="ov-directors">${dirs}</div>`;
    card.onclick=()=>setTab(`l${l.id}`);grid.appendChild(card);
  });

  // Semester B cards
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length,p=pctOf(w,t);
    const card=document.createElement('div');card.className='ov-card';card.dataset.l=l.id;
    const fh=mandatory(l).map(f=>`<span class="ov-film-tag${fs(f.id).watched?' ov-film-done':''}" data-fid="${f.id}">${f.title.split('/')[0].trim()}</span>`).join('');
    card.innerHTML=`<div class="ov-num">נושא ${l.id} · ${decade[l.id]||''}</div><div class="ov-title">${l.title}</div><div class="ov-prog-row"><div class="ov-track"><div class="ov-fill${p===100?' full':''}" style="width:${p}%"></div></div><span class="ov-frac${p===100?' full':''}">${w} / ${t}</span></div><div class="ov-films">${fh}</div>`;
    card.onclick=()=>setTab(`l${l.id}`);grid.appendChild(card);
  });

  panel.appendChild(grid);return panel;
}

// ── Lesson panel ─────────────────────────────────────
function buildLesson(l){
  const panel=document.createElement('div');panel.className='panel';panel.dataset.p=`l${l.id}`;
  const w=watchedCount(l),t=mandatory(l).length;
  const isA=l.semester==='א';

  const hd=document.createElement('div');hd.className='lesson-hd';
  hd.innerHTML=`<div class="lesson-hd-top"><h2>${l.title}</h2><span class="lesson-num-badge">נושא ${l.id}</span></div>${l.subtitle?`<div class="lesson-subtitle">${l.subtitle}</div>`:''}${t?`<div class="lesson-frac"><b>${w}</b> / ${t} נצפו</div>`:''}`;
  panel.appendChild(hd);

  // Films: mandatory first, then clips
  const mandFilms=l.films.filter(f=>f.mandatory);
  const clipFilms=l.films.filter(f=>!f.mandatory);

  function buildSection(title,films,noLabel=false){
    if(!films.length)return;
    const box=document.createElement('div');box.className='sec-box';
    box.innerHTML=`<div class="sec-box-hd"><h3>${title}</h3></div>`;
    const body=document.createElement('div');body.className='sec-box-body';
    const grid=document.createElement('div');grid.className='film-grid';
    films.forEach(film=>grid.appendChild(buildCard(film,panel,l,isA,noLabel)));
    body.appendChild(grid);box.appendChild(body);panel.appendChild(box);
  }

  if(isA){
    // Semester A: all in one section, no type badge, no mandatory flag display
    buildSection('סרטים וקטעים',l.films,true);
  } else {
    buildSection('סרטי חובה',mandFilms);
    buildSection('קטעים שהוקרנו בכיתה',clipFilms);
  }

  return panel;
}

// ── Film card ────────────────────────────────────────
function buildCard(film,panel,l,isA,noLabel){
  const s=fs(film.id);
  const card=document.createElement('div');
  card.className='fc'+(s.watched?' watched':'')+(isA?' sem-a-card':'');
  const meta=[film.director,film.year,film.duration?film.duration+"′":null].filter(Boolean).join(' · ');

  const top=document.createElement('div');top.className='fc-top';
  const check=document.createElement('button');check.className='fc-check';check.textContent=s.watched?'✓':'';
  const titleEl=document.createElement('div');titleEl.className='fc-title';titleEl.textContent=film.title;
  if(s.watched){titleEl.style.textDecoration='line-through';titleEl.style.color='var(--muted)';}

  check.onclick=()=>{
    const s2=fs(film.id);s2.watched=!s2.watched;save();
    card.classList.toggle('watched',s2.watched);
    check.textContent=s2.watched?'✓':'';
    titleEl.style.textDecoration=s2.watched?'line-through':'';titleEl.style.color=s2.watched?'var(--muted)':'';
    if(s2.watched&&film.mandatory) showWit(film.id);
    const frac=panel.querySelector('.lesson-frac');
    if(frac){const ww=watchedCount(l),tt=mandatory(l).length;frac.innerHTML=`<b>${ww}</b> / ${tt} נצפו`;}
    refreshProgress();
  };

  if(!noLabel){
    const typeEl=document.createElement('span');
    typeEl.className='fc-type '+(film.mandatory?'mandatory':'clip');
    typeEl.textContent=film.mandatory?'חובה':'(קטע)';
    top.appendChild(check);top.appendChild(typeEl);
  } else {
    top.appendChild(check);
  }

  card.appendChild(top);card.appendChild(titleEl);
  if(meta){const m=document.createElement('div');m.className='fc-meta';m.textContent=meta;card.appendChild(m);}

  if(film.clips.length){
    const cd=document.createElement('div');cd.className='fc-clips';
    film.clips.forEach((clip,i)=>{
      const cr=document.createElement('div');cr.className='fc-clip-row'+(s.clips[i]?' done':'');
      const cb=document.createElement('button');cb.className='fc-clip-box';cb.textContent=s.clips[i]?'✓':'';
      cb.onclick=()=>{const s2=fs(film.id);s2.clips[i]=!s2.clips[i];save();cr.classList.toggle('done',!!s2.clips[i]);cb.textContent=s2.clips[i]?'✓':'';};
      const ct=document.createElement('span');ct.className='fc-clip-txt';ct.textContent=clip;
      cr.appendChild(cb);cr.appendChild(ct);cd.appendChild(cr);
    });
    card.appendChild(cd);
  }
  return card;
}

// ── Init ─────────────────────────────────────────────
buildTabs();buildNavSheet();
const main=document.getElementById('main');
main.appendChild(buildOverview());
LESSONS.forEach(l=>main.appendChild(buildLesson(l)));
refreshProgress();
</script>
</body>
