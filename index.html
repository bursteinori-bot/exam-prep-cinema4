<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תולדות הקולנוע 4 - הכנה למבחן</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-bold-webfont.ttf') format('truetype'); font-weight:700; }
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-light-webfont.ttf') format('truetype'); font-weight:300; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:400; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:600; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:700; }
  </style>
  <style>
    :root {
      --bg:#F2F1EE; --surface:#FFF; --inset:#F7F6F3;
      --border:#E5E4E0; --text:#1C1B19; --muted:#8E8D8A;
      --faint:#C4C3BF; --green:#1A7A52; --green-bg:#E8F5EE; --blue:#1560A8;
    }
    html { font-size: 36px; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background:var(--bg); color:var(--text); font-family:"Yehuda","Baskerville",Georgia,serif; min-height:100vh; direction:rtl; -webkit-font-smoothing:antialiased; }

    /* ── Header ── */
    header { background:rgba(255,255,255,.92); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:.5px solid var(--border); padding:12px 24px 0; position:sticky; top:0; z-index:200; }
    .header-top { display:flex; align-items:center; justify-content:space-between; gap:12px; padding-bottom:10px; }
    header h1 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.95rem; font-weight:600; color:var(--text); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .progress-pill { display:flex; align-items:center; gap:7px; }
    .progress-track { width:60px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .35s; }
    .progress-pct { font-size:.68rem; font-weight:600; color:var(--text); min-width:26px; }
    .countdown { font-size:.68rem; color:var(--muted); white-space:nowrap; }
    .countdown b { color:var(--text); font-weight:700; }

    /* User button */
    .user-btn { display:flex; align-items:center; gap:5px; padding:5px 10px; border-radius:20px; border:.5px solid var(--border); background:var(--surface); font-size:.68rem; font-family:inherit; cursor:pointer; color:var(--text); transition:background .12s; }
    .user-btn:hover { background:var(--inset); }
    .user-btn .uname { max-width:80px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

    /* ── Tab bar ── */
    .tab-bar { display:flex; overflow-x:auto; scrollbar-width:none; gap:2px; margin:0 -24px; padding:0 20px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; padding:7px 12px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.75rem; font-family:inherit; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; margin-bottom:-.5px; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }
    .tab-frac { font-size:.6rem; color:var(--faint); margin-right:2px; }
    .tab-btn.active .tab-frac { color:var(--muted); }
    .tab-divider { width:1px; background:var(--border); margin:6px 4px; flex-shrink:0; }
    .tab-sem-label { font-size:.58rem; color:var(--faint); padding:0 5px; align-self:center; flex-shrink:0; }
    .tab-btn.sem-a { color:#A08840; }
    .tab-btn.sem-a.active { color:#7A6020; border-bottom-color:#A08840; }

    /* ── Main ── */
    main { max-width:100%; padding:20px 16px 56px; }
    .panel { display:none; } .panel.active { display:block; }

    /* ── Lesson header ── */
    .lesson-hd { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:16px; }
    .lesson-hd h2 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:1.1rem; font-weight:600; color:var(--text); line-height:1.3; flex:1; }
    .lesson-frac { font-size:.68rem; color:var(--muted); white-space:nowrap; }
    .lesson-frac b { color:var(--text); }
    .lesson-subtitle { font-size:.7rem; color:#A08840; margin-top:3px; margin-bottom:12px; }

    /* ── Section boxes ── */
    .sec-box { background:var(--surface); border-radius:14px; box-shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04); margin-top:16px; overflow:hidden; }
    .sec-box-hd { display:flex; align-items:center; justify-content:space-between; padding:11px 16px 10px; border-bottom:.5px solid var(--border); }
    .sec-box-hd h3 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.82rem; font-weight:700; color:var(--text); }
    .sec-box-body { padding:10px 14px; }

    /* ── Film cards grid ── */
    .film-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; align-items:start; }
    @media(max-width:900px) { .film-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:580px) { .film-grid { grid-template-columns:repeat(2,1fr); } }

    .fc { background:var(--surface); border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.05); padding:9px 10px 8px; display:flex; flex-direction:column; gap:0; }
    .fc.watched { background:var(--green-bg); }

    .fc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:5px; gap:6px; }
    .fc-check { width:17px; height:17px; min-width:17px; border-radius:50%; border:1.5px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.52rem; color:#fff; transition:background .15s,border-color .15s; flex-shrink:0; margin-top:1px; }
    .fc-check:hover { border-color:var(--green); }
    .fc.watched .fc-check { background:var(--green); border-color:var(--green); }
    .fc-check:disabled { opacity:.35; cursor:not-allowed; }
    .fc-type { font-size:.52rem; font-weight:600; letter-spacing:.03em; padding:1px 5px; border-radius:20px; flex-shrink:0; }
    .fc-type.mandatory { background:rgba(21,96,168,.1); color:var(--blue); }
    .fc-type.clip { background:rgba(0,0,0,.05); color:var(--muted); }

    .fc-title { font-family:"Yehuda","Baskerville",Georgia,serif; font-size:.72rem; font-weight:600; color:var(--text); line-height:1.3; }
    .fc.watched .fc-title { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint); }
    .fc-meta { font-family:"Courier New",monospace; font-size:.52rem; color:var(--faint); margin-top:2px; }

    .fc-clips { margin-top:6px; border-top:.5px solid var(--border); padding-top:5px; display:flex; flex-direction:column; gap:3px; }
    .fc-clip-row { display:flex; align-items:flex-start; gap:5px; }
    .fc-clip-box { width:12px; height:12px; min-width:12px; margin-top:2px; border-radius:2px; border:1.5px solid var(--faint); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.48rem; color:#fff; transition:background .1s,border-color .1s; flex-shrink:0; }
    .fc-clip-box:hover { border-color:var(--text); }
    .fc-clip-row.done .fc-clip-box { background:var(--text); border-color:var(--text); }
    .fc-clip-txt { font-size:.6rem; color:var(--muted); line-height:1.4; }
    .fc-clip-row.done .fc-clip-txt { color:var(--faint); text-decoration:line-through; }

    /* ── Overview grid ── */
    .ov-header { margin-bottom:20px; }
    .ov-header h2 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:1.1rem; font-weight:600; margin-bottom:3px; }
    .ov-header p { font-size:.72rem; color:var(--muted); }
    .ov-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:10px; align-items:stretch; }
    @media(max-width:900px) { .ov-grid { grid-template-columns:repeat(4,1fr); } }
    @media(max-width:640px) { .ov-grid { grid-template-columns:repeat(3,1fr) !important; gap:6px; } }
    @media(max-width:420px) { .ov-grid { grid-template-columns:repeat(2,1fr) !important; } }
    .ov-card { background:var(--surface); border-radius:13px; padding:13px 14px; box-shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04); cursor:pointer; transition:box-shadow .15s; display:flex; flex-direction:column; }
    .ov-card:hover { box-shadow:0 3px 10px rgba(0,0,0,.09),0 0 0 .5px rgba(0,0,0,.07); }
    .ov-card.sem-a { background:#FEFCF5; border:.5px solid #E8E0C8; }
    .ov-card.sem-a .ov-num { color:#A08840; }
    .ov-card.sem-a .ov-subtitle { font-size:.55rem; color:#A08840; margin-top:-3px; margin-bottom:8px; line-height:1.4; }
    .ov-num { font-size:.56rem; color:var(--faint); letter-spacing:.04em; margin-bottom:3px; }
    .ov-title { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.78rem; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:9px; }
    .ov-prog-row { display:flex; align-items:center; gap:7px; margin-bottom:7px; }
    .ov-track { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .ov-fill { height:100%; background:var(--text); border-radius:2px; transition:width .3s; }
    .ov-fill.full { background:var(--green); }
    .ov-frac { font-size:.6rem; color:var(--muted); white-space:nowrap; }
    .ov-frac.full { color:var(--green); }
    .ov-films { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
    .ov-film-m { font-size:.58rem; font-weight:600; color:var(--text); background:var(--inset); border:.5px solid var(--border); border-radius:5px; padding:2px 7px; white-space:nowrap; }
    .ov-film-done { color:var(--faint); background:transparent; text-decoration:line-through; }

    /* ── Summary buttons ── */
    .sum-btns { display:flex; flex-wrap:wrap; gap:7px; }
    .sum-btn { display:flex; align-items:center; gap:5px; padding:7px 12px; border-radius:9px; border:.5px solid var(--border); background:var(--inset); font-size:.68rem; font-family:inherit; color:var(--text); cursor:pointer; transition:background .12s,border-color .12s; }
    .sum-btn:hover { background:var(--border); }
    .sum-btn.add { border-style:dashed; color:var(--muted); }
    .sum-btn.add:hover { color:var(--text); border-color:var(--text); }
    .personal-entries { margin-top:12px; display:flex; flex-direction:column; gap:7px; }
    .pe-item { background:var(--inset); border-radius:9px; padding:10px 14px; font-size:.72rem; line-height:1.65; direction:rtl; position:relative; cursor:pointer; transition:background .1s; }
    .pe-item:hover { background:var(--border); }
    .pe-del { position:absolute; top:6px; left:8px; background:none; border:none; color:var(--faint); cursor:pointer; font-size:.62rem; padding:2px 4px; border-radius:4px; transition:color .12s; }
    .pe-del:hover { color:var(--text); }
    .pe-body { white-space:pre-wrap; padding-left:18px; }

    /* ── Reading Panel ── */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.18); z-index:299; opacity:0; pointer-events:none; transition:opacity .25s; }
    .backdrop.open { opacity:1; pointer-events:auto; }
    .reading-panel { position:fixed; bottom:0; right:0; left:0; height:82vh; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 32px rgba(0,0,0,.14); z-index:300; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .reading-panel.open { transform:translateY(0); }
    .rp-header { display:flex; align-items:center; justify-content:space-between; padding:14px 20px 11px; border-bottom:.5px solid var(--border); flex-shrink:0; }
    .rp-title { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.88rem; font-weight:700; color:var(--text); line-height:1.3; }
    .rp-close { width:30px; height:30px; border-radius:50%; border:none; background:var(--inset); color:var(--muted); cursor:pointer; font-size:.7rem; display:flex; align-items:center; justify-content:center; transition:background .12s; flex-shrink:0; }
    .rp-close:hover { background:var(--border); color:var(--text); }
    .rp-body { flex:1; overflow-y:auto; padding:18px 22px 40px; direction:rtl; }
    .rp-body::-webkit-scrollbar { width:4px; }
    .rp-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .rp-date { font-family:"Courier New",monospace; font-size:.58rem; color:var(--muted); margin-bottom:14px; }
    .rp-heading { font-size:.78rem; font-weight:700; color:var(--text); margin-top:16px; margin-bottom:3px; line-height:1.4; }
    .rp-subheading { font-size:.75rem; font-weight:700; color:var(--text); margin-top:9px; margin-bottom:2px; }
    .rp-para { font-size:.74rem; line-height:1.78; color:var(--text); margin-bottom:5px; direction:rtl; }
    .rp-para.bold { font-weight:700; margin-top:12px; margin-bottom:2px; }
    .rp-list { padding-right:16px; margin-bottom:7px; }
    .rp-li { font-size:.72rem; line-height:1.7; color:var(--text); margin-bottom:2px; direction:rtl; }
    .rp-add-ta { width:100%; min-height:110px; background:var(--inset); border:1px solid var(--border); border-radius:9px; padding:10px 12px; font-size:.74rem; font-family:inherit; color:var(--text); direction:rtl; resize:vertical; outline:none; line-height:1.6; transition:border-color .15s; }
    .rp-add-ta:focus { border-color:var(--text); }
    .rp-add-ta::placeholder { color:var(--faint); }
    .rp-save-btn { margin-top:9px; padding:7px 16px; background:var(--text); color:#fff; border:none; border-radius:8px; font-size:.68rem; font-family:inherit; cursor:pointer; }
    .rp-save-btn:hover { background:#333; }

    /* ── User Panel (small sheet) ── */
    .user-panel { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:16px 16px 0 0; box-shadow:0 -4px 24px rgba(0,0,0,.12); z-index:301; padding:16px 20px 32px; transform:translateY(100%); transition:transform .25s cubic-bezier(.32,.72,0,1); max-height:70vh; overflow-y:auto; }
    .user-panel.open { transform:translateY(0); }
    .up-title { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.82rem; font-weight:700; margin-bottom:14px; }
    .up-item { display:flex; align-items:center; gap:10px; padding:9px 12px; border-radius:9px; cursor:pointer; transition:background .12s; margin-bottom:4px; font-size:.75rem; }
    .up-item:hover { background:var(--inset); }
    .up-item.active { background:var(--green-bg); font-weight:600; color:var(--green); }
    .up-dot { width:10px; height:10px; border-radius:50%; border:1.5px solid var(--faint); flex-shrink:0; }
    .up-item.active .up-dot { background:var(--green); border-color:var(--green); }
    .up-add { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:9px; cursor:pointer; border:1px dashed var(--border); color:var(--muted); font-size:.72rem; font-family:inherit; background:none; width:100%; margin-top:6px; transition:border-color .12s,color .12s; }
    .up-add:hover { border-color:var(--text); color:var(--text); }

    /* ── Mobile nav ── */
    .mob-nav { display:none; align-items:center; gap:0; border-top:.5px solid var(--border); padding:0; }
    .mob-nav-label { flex:1; padding:10px 14px; font-size:.72rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mob-nav-label .sub { display:block; font-size:.58rem; color:var(--muted); font-weight:400; margin-top:1px; }
    .mob-menu-btn { padding:10px 14px; background:none; border:none; border-right:.5px solid var(--border); font-size:.9rem; cursor:pointer; color:var(--text); flex-shrink:0; min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }

    /* nav sheet */
    .nav-sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 24px rgba(0,0,0,.14); z-index:302; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .nav-sheet.open { transform:translateY(0); }
    .ns-header { padding:14px 18px 10px; font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.85rem; font-weight:700; border-bottom:.5px solid var(--border); }
    .ns-item { display:flex; align-items:center; gap:10px; padding:12px 18px; border-bottom:.5px solid var(--border); cursor:pointer; transition:background .1s; min-height:52px; }
    .ns-item:hover, .ns-item.active { background:var(--inset); }
    .ns-item.active { font-weight:600; }
    .ns-item-title { font-size:.72rem; color:var(--text); line-height:1.35; }
    .ns-item-frac { font-size:.6rem; color:var(--muted); margin-right:auto; white-space:nowrap; }
    .ns-item.sem-a .ns-item-title { color:#A08840; }

    /* ── Mobile ── */
    @media(max-width:640px) {
      .tab-bar { display:none; }
      .mob-nav { display:flex; }
      html { font-size:17px; }
      .film-grid { grid-template-columns:repeat(2,1fr) !important; gap:7px; }
      .ov-grid { grid-template-columns:repeat(2,1fr) !important; gap:6px; }
      .fc { padding:8px 9px 7px; }
      .fc-title { font-size:.7rem; }
      .fc-meta { font-size:.5rem; }
      .fc-clip-txt { font-size:.58rem; }
    }
    @media(max-width:480px) {
      html { font-size:15px; }
      header { padding:8px 12px 0; }
      .header-top { gap:6px; }
      header h1 { font-size:.88rem; }
      .countdown { display:none; }
      .user-btn .uname { max-width:52px; }
      .progress-track { width:40px; }
      main { padding:12px 8px 48px; }
      .sec-box-body { padding:8px 10px; }
      .sec-box-hd { padding:10px 12px 9px; }
      .sec-box-hd h3 { font-size:.76rem; }
      .reading-panel { height:93vh; border-radius:14px 14px 0 0; }
      .rp-body { padding:12px 14px 28px; }
      .rp-title { font-size:.8rem; }
      .sum-btns { flex-direction:column; }
      .sum-btn { width:100%; justify-content:center; min-height:40px; }
      .lesson-hd h2 { font-size:.9rem; }
      .lesson-hd { margin-bottom:12px; }
      .tab-btn { padding:7px 9px; font-size:.68rem; }
      .ov-title { font-size:.7rem; }
      .ov-card { padding:10px 11px; }
      .pe-item { font-size:.68rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>תולדות הקולנוע 4</h1>
    <div class="header-right">
      <button class="user-btn" id="user-btn">
        <span>👤</span><span class="uname" id="user-label">אורח</span><span>▾</span>
      </button>
      <div class="progress-pill">
        <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
        <span class="progress-pct" id="overall-pct">0%</span>
      </div>
      <span class="countdown"><b id="cd-days">-</b> ימים</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="mob-nav" id="mob-nav">
    <button class="mob-menu-btn" id="mob-menu-btn">☰</button>
    <div class="mob-nav-label" id="mob-nav-label">
      <span id="mob-nav-main">סקירה</span>
      <span class="sub" id="mob-nav-sub"></span>
    </div>
  </div>
</header>

<div class="backdrop" id="nav-backdrop" style="z-index:301"></div>
<div class="nav-sheet" id="nav-sheet">
  <div class="ns-header">בחר שיעור</div>
  <div id="ns-list"></div>
</div>

<!-- Backdrops & panels -->
<div class="backdrop" id="backdrop"></div>
<div class="reading-panel" id="reading-panel">
  <div class="rp-header">
    <span class="rp-title" id="rp-title"></span>
    <button class="rp-close" id="rp-close">✕</button>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<div class="backdrop" id="up-backdrop" style="z-index:300"></div>
<div class="user-panel" id="user-panel">
  <div class="up-title">החלפת משתמש</div>
  <div id="up-list"></div>
  <button class="up-add" id="up-add">+ משתמש חדש</button>
</div>

<input type="file" id="file-input" accept=".txt,.docx,.pdf" style="display:none">
<main id="main"></main>

<script src="data.js"></script>
<script src="summaries.js"></script>
<script src="notion_summaries.js"></script>
<script>
// ── Multi-user state ─────────────────────────────────
let CURRENT_USER = localStorage.getItem('cinema4_active') || 'guest';

function getUsers() { try { return JSON.parse(localStorage.getItem('cinema4_users'))||[]; } catch { return []; } }
function saveUsers(arr) { localStorage.setItem('cinema4_users', JSON.stringify(arr)); }

function getUserData(u) {
  if (u==='guest') return { films:{}, lessons:{} };
  try { return JSON.parse(localStorage.getItem('cinema4_user_'+u))||{films:{},lessons:{}}; }
  catch { return {films:{},lessons:{}}; }
}
function saveCurrentData() {
  if (CURRENT_USER==='guest') return;
  localStorage.setItem('cinema4_user_'+CURRENT_USER, JSON.stringify(_UD));
}

let _UD = getUserData(CURRENT_USER);

function fs(id) {
  if (!_UD.films) _UD.films={};
  if (!_UD.films[id]) _UD.films[id]={watched:false,clips:{}};
  return _UD.films[id];
}
function ls(id) {
  if (!_UD.lessons) _UD.lessons={};
  if (!_UD.lessons[id]) _UD.lessons[id]={summaries:[]};
  return _UD.lessons[id];
}

function switchUser(name) {
  CURRENT_USER = name;
  localStorage.setItem('cinema4_active', name);
  _UD = getUserData(name);
  document.getElementById('user-label').textContent = name==='guest' ? 'אורח' : name;
  closeUserPanel();
  rebuildAll();
}

function createUser() {
  const name = prompt('שם המשתמש:');
  if (!name || !name.trim()) return;
  const n = name.trim();
  const users = getUsers();
  if (!users.includes(n)) { users.push(n); saveUsers(users); }
  switchUser(n);
}

// ── Progress ──────────────────────────────────────────
const mandatory = l => l.films.filter(f => f.mandatory);
const watchedCount = l => mandatory(l).filter(f => fs(f.id).watched).length;
const pctOf = (w,t) => t ? Math.round(w/t*100) : 0;
function overallPct() {
  const all = LESSONS.flatMap(mandatory);
  return pctOf(all.filter(f => fs(f.id).watched).length, all.length);
}

function refreshProgress() {
  const p = overallPct();
  document.getElementById('overall-bar').style.width = p+'%';
  document.getElementById('overall-pct').textContent = p+'%';
  LESSONS.forEach(l => {
    const w=watchedCount(l), t=mandatory(l).length;
    const frac = document.querySelector(`.tab-frac[data-l="${l.id}"]`);
    if (frac) frac.textContent = t ? ` ${w}/${t}` : '';
    const card = document.querySelector(`.ov-card[data-l="${l.id}"]`);
    if (card) {
      const p2=pctOf(w,t);
      const fill=card.querySelector('.ov-fill'), fracEl=card.querySelector('.ov-frac');
      if (fill) { fill.style.width=p2+'%'; fill.className='ov-fill'+(p2===100?' full':''); }
      if (fracEl) { fracEl.textContent=`${w} / ${t}`; fracEl.className='ov-frac'+(p2===100?' full':''); }
      card.querySelectorAll('.ov-film-m').forEach(el => {
        const id=el.dataset.fid; if (id) el.className='ov-film-m'+(fs(id).watched?' ov-film-done':'');
      });
    }
  });
}

// ── Markdown renderer ─────────────────────────────────
function renderMd(text, container) {
  const lines = text.split('\n');
  let ul = null;
  lines.forEach(line => {
    if (!line.trim()) { ul=null; return; }
    const el = document.createElement(line.startsWith('- ') ? 'li' : 'div');
    if (line.startsWith('### ')) {
      el.className='rp-heading'; el.textContent=line.slice(4); container.appendChild(el); ul=null;
    } else if (/^\*\*[^*]+\*\*$/.test(line)) {
      el.className='rp-subheading'; el.textContent=line.slice(2,-2); container.appendChild(el); ul=null;
    } else if (line.startsWith('- ')) {
      if (!ul) { ul=document.createElement('ul'); ul.className='rp-list'; container.appendChild(ul); }
      const li=document.createElement('li'); li.className='rp-li';
      li.innerHTML=line.slice(2).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      ul.appendChild(li);
    } else {
      el.className='rp-para'; el.innerHTML=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      container.appendChild(el); ul=null;
    }
  });
}

// ── File upload ───────────────────────────────────────
function loadScript(src) {
  return new Promise((res,rej) => {
    const s=document.createElement('script'); s.src=src; s.onload=res; s.onerror=rej;
    document.head.appendChild(s);
  });
}

async function handleFileUpload(file, lessonId, onSave) {
  let text = '';
  const ext = file.name.split('.').pop().toLowerCase();
  try {
    if (ext==='txt') {
      text = await file.text();
    } else if (ext==='docx') {
      if (!window.mammoth) await loadScript('https://unpkg.com/mammoth/mammoth.browser.min.js');
      const ab = await file.arrayBuffer();
      const result = await mammoth.extractRawText({ arrayBuffer: ab });
      text = result.value;
    } else if (ext==='pdf') {
      if (!window.pdfjsLib) {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js');
        window.pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      }
      const ab = await file.arrayBuffer();
      const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
      const pages = [];
      for (let i=1; i<=pdf.numPages; i++) {
        const page = await pdf.getPage(i);
        const tc = await page.getTextContent();
        pages.push(tc.items.map(item => item.str).join(' '));
      }
      text = pages.join('\n\n');
    }
  } catch(e) {
    alert('שגיאה בקריאת הקובץ: '+e.message);
    return;
  }

  openReadingPanel('תצוגה מקדימה - '+file.name, body => {
    const pre=document.createElement('div'); pre.className='rp-para'; pre.style.whiteSpace='pre-wrap';
    pre.textContent = text.slice(0,6000)+(text.length>6000?'\n[...]':'');
    body.appendChild(pre);
    const btn=document.createElement('button'); btn.className='rp-save-btn'; btn.textContent='שמור סיכום';
    btn.onclick = () => {
      const lstate=ls(lessonId);
      if (!lstate.summaries) lstate.summaries=[];
      lstate.summaries.push(text);
      saveCurrentData();
      closeReadingPanel();
      onSave();
    };
    body.appendChild(btn);
  });
}

const HAGAR_MAP = { 1:['1'],2:['2','3'],3:['4','5'],4:['6','7'],5:[],6:['9'],7:['10','11'] };

let active = 'overview';
function setTab(id) {
  active=id;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.dataset.p===id));
  // update mobile nav label
  const mainEl = document.getElementById('mob-nav-main');
  const subEl = document.getElementById('mob-nav-sub');
  if (id==='overview') { mainEl.textContent='סקירה'; subEl.textContent=''; }
  else {
    const lid = id.slice(1); // remove 'l' prefix
    const lesson = LESSONS.find(l=>String(l.id)===lid);
    if (lesson) {
      mainEl.textContent = (lesson.semester?'נושא ':'שיעור ')+lesson.id;
      subEl.textContent = lesson.title;
    }
  }
  // update active in sheet
  document.querySelectorAll('.ns-item').forEach(it => it.classList.toggle('active', it.dataset.t===id));
  closeNavSheet();
}

// ── Lesson panel ──────────────────────────────────────
function buildLesson(l) {
  const panel=document.createElement('div'); panel.className='panel'; panel.dataset.p=`l${l.id}`;
  const w=watchedCount(l),t=mandatory(l).length;
  const hd=document.createElement('div'); hd.className='lesson-hd';
  hd.innerHTML=`<h2>${l.semester?'נושא '+l.id:'שיעור '+l.id} - ${l.title}</h2>${t?`<span class="lesson-frac"><b>${w}</b> / ${t} נצפו</span>`:''}`;
  panel.appendChild(hd);
  if (l.subtitle) { const sub=document.createElement('div'); sub.className='lesson-subtitle'; sub.textContent=l.subtitle; panel.appendChild(sub); }

  // Films box
  const filmsBox=document.createElement('div'); filmsBox.className='sec-box';
  filmsBox.innerHTML=`<div class="sec-box-hd"><h3>צפייה בסרטים</h3></div>`;
  const filmsBody=document.createElement('div'); filmsBody.className='sec-box-body';
  filmsBody.appendChild(buildFilmList(l, panel));
  filmsBox.appendChild(filmsBody);

  // Summaries box — built first, appended first (above films)
  const hagarParas=getHagarParas(l.id), hasHagar=hagarParas.length>0;
  const notionData=typeof NOTION_SUMMARIES!=='undefined' && NOTION_SUMMARIES[String(l.id)];
  const lstate=ls(l.id);

  const sumBox=document.createElement('div'); sumBox.className='sec-box';
  sumBox.innerHTML=`<div class="sec-box-hd"><h3>סיכומים</h3></div>`;
  const sumBody=document.createElement('div'); sumBody.className='sec-box-body';
  const btns=document.createElement('div'); btns.className='sum-btns';

  if (hasHagar) {
    const b=document.createElement('button'); b.className='sum-btn'; b.textContent='סיכום הגר';
    b.onclick=()=>openReadingPanel('סיכום הגר - שיעור '+(l.semester?'נושא ':'')+l.id, body=>{
      const dateKeys=HAGAR_MAP[l.id]||[];
      if (dateKeys.length) { const d=document.createElement('p'); d.className='rp-date'; d.textContent=dateKeys.map(k=>(SUMMARIES[k]||[])[0]?.text).filter(Boolean).join(' + '); body.appendChild(d); }
      hagarParas.forEach(p=>{ const el=document.createElement('p'); el.className='rp-para'+(p.bold?' bold':''); el.textContent=p.text; body.appendChild(el); });
    });
    btns.appendChild(b);
  }

  if (notionData && notionData.length) {
    const b=document.createElement('button'); b.className='sum-btn';
    b.textContent=notionData.length>1?`הקלטה (${notionData.length})`:'הקלטה';
    b.onclick=()=>openReadingPanel('הקלטה - '+notionData.map(n=>n.title).join(' + '), body=>{
      notionData.forEach((note,i)=>{
        if (i>0) { const hr=document.createElement('hr'); hr.style.cssText='border:none;border-top:1px solid var(--border);margin:16px 0'; body.appendChild(hr); }
        const d=document.createElement('p'); d.className='rp-date'; d.textContent=note.date+' · '+note.title; body.appendChild(d);
        renderMd(note.text, body);
      });
    });
    btns.appendChild(b);
  }

  // Friends' summaries
  const friendSums = getUsers().filter(u=>u!==CURRENT_USER).flatMap(u=>{
    const d=getUserData(u); return (d.lessons?.[l.id]?.summaries||[]).map(s=>({user:u,text:s}));
  });
  if (friendSums.length) {
    const b=document.createElement('button'); b.className='sum-btn'; b.textContent=`סיכומי חברים (${friendSums.length})`;
    b.onclick=()=>openReadingPanel('סיכומי חברים', body=>{
      friendSums.forEach(({user,text})=>{
        const h=document.createElement('p'); h.className='rp-heading'; h.textContent=user; body.appendChild(h);
        const p=document.createElement('p'); p.className='rp-para'; p.style.whiteSpace='pre-wrap'; p.textContent=text; body.appendChild(p);
      });
    });
    btns.appendChild(b);
  }

  // File upload button
  const upBtn=document.createElement('button'); upBtn.className='sum-btn add'; upBtn.textContent='📎 העלה קובץ';
  upBtn.onclick=()=>{
    const fi=document.getElementById('file-input');
    fi.onchange=async()=>{ if (fi.files[0]) { await handleFileUpload(fi.files[0], l.id, renderEntries); fi.value=''; } };
    fi.click();
  };
  btns.appendChild(upBtn);

  // Add summary button
  const addBtn=document.createElement('button'); addBtn.className='sum-btn add'; addBtn.textContent='+ הוסף סיכום';
  addBtn.onclick=()=>openReadingPanel('הוסף סיכום', body=>{
    const ta=document.createElement('textarea'); ta.className='rp-add-ta'; ta.placeholder='כתוב סיכום...';
    const btn=document.createElement('button'); btn.className='rp-save-btn'; btn.textContent='שמור';
    btn.onclick=()=>{ const v=ta.value.trim(); if (!v) return; if (!lstate.summaries) lstate.summaries=[]; lstate.summaries.push(v); saveCurrentData(); closeReadingPanel(); renderEntries(); };
    body.appendChild(ta); body.appendChild(btn); setTimeout(()=>ta.focus(),50);
  });
  if (CURRENT_USER!=='guest') btns.appendChild(addBtn);
  if (CURRENT_USER!=='guest') btns.appendChild(upBtn);
  // show read-only for guest
  if (CURRENT_USER==='guest') {
    const g=document.createElement('p'); g.style.cssText='font-size:.62rem;color:var(--muted);margin-top:4px';
    g.textContent='היכנס כמשתמש כדי לסמן סרטים ולהוסיף סיכומים'; btns.appendChild(g);
  }
  sumBody.appendChild(btns);

  const entriesEl=document.createElement('div'); entriesEl.className='personal-entries';
  function renderEntries() {
    entriesEl.innerHTML='';
    (lstate.summaries||[]).forEach((txt,i)=>{
      const item=document.createElement('div'); item.className='pe-item';
      const del=document.createElement('button'); del.className='pe-del'; del.textContent='✕';
      del.onclick=e=>{ e.stopPropagation(); lstate.summaries.splice(i,1); saveCurrentData(); renderEntries(); };
      const body2=document.createElement('div'); body2.className='pe-body'; body2.textContent=txt.slice(0,200)+(txt.length>200?'...':'');
      item.addEventListener('click',e=>{ if(e.target===del)return; openReadingPanel('סיכום אישי',body=>{ const p=document.createElement('p'); p.className='rp-para'; p.style.whiteSpace='pre-wrap'; p.textContent=txt; body.appendChild(p); }); });
      if (CURRENT_USER!=='guest') item.appendChild(del);
      item.appendChild(body2); entriesEl.appendChild(item);
    });
  }
  renderEntries();
  sumBody.appendChild(entriesEl);
  sumBox.appendChild(sumBody);
  panel.appendChild(sumBox);
  panel.appendChild(filmsBox);
  return panel;
}

// ── Film cards ──────────────────────────────────────────
function buildFilmList(lesson, panel) {
  const grid=document.createElement('div'); grid.className='film-grid';
  const isGuest = CURRENT_USER==='guest';

  lesson.films.forEach(film=>{
    const s=fs(film.id);
    const card=document.createElement('div'); card.className='fc'+(s.watched?' watched':'');
    const meta=[film.director,film.year,film.duration?film.duration+"′":null].filter(Boolean).join(' · ');

    // top row: check + type badge
    const top=document.createElement('div'); top.className='fc-top';
    const check=document.createElement('button'); check.className='fc-check';
    check.textContent=s.watched?'✓':'';
    if (isGuest) { check.disabled=true; check.title='היכנס כמשתמש לסימון'; }
    else {
      check.onclick=()=>{
        const s2=fs(film.id); s2.watched=!s2.watched; saveCurrentData();
        card.classList.toggle('watched',s2.watched);
        check.textContent=s2.watched?'✓':'';
        titleEl.style.textDecoration=s2.watched?'line-through':'';
        titleEl.style.color=s2.watched?'var(--muted)':'';
        const frac=panel.querySelector('.lesson-frac');
        if(frac){const ww=watchedCount(lesson),tt=mandatory(lesson).length;frac.innerHTML=`<b>${ww}</b> / ${tt} נצפו`;}
        refreshProgress();
      };
    }
    const typeEl=document.createElement('span'); typeEl.className='fc-type '+(film.mandatory?'mandatory':'clip');
    typeEl.textContent=film.mandatory?'חובה':'(קטע)';
    top.appendChild(check); top.appendChild(typeEl);
    card.appendChild(top);

    // title
    const titleEl=document.createElement('div'); titleEl.className='fc-title'; titleEl.textContent=film.title;
    if (s.watched){titleEl.style.textDecoration='line-through';titleEl.style.color='var(--muted)';}
    card.appendChild(titleEl);

    // meta
    if (meta){const m=document.createElement('div');m.className='fc-meta';m.textContent=meta;card.appendChild(m);}

    // clips — always visible
    if (film.clips.length) {
      const clipsDiv=document.createElement('div'); clipsDiv.className='fc-clips';
      film.clips.forEach((clip,i)=>{
        const cr=document.createElement('div'); cr.className='fc-clip-row'+(s.clips[i]?' done':'');
        const cb=document.createElement('button'); cb.className='fc-clip-box'; cb.textContent=s.clips[i]?'✓':'';
        cb.onclick=()=>{ const s2=fs(film.id); s2.clips[i]=!s2.clips[i]; saveCurrentData(); cr.classList.toggle('done',!!s2.clips[i]); cb.textContent=s2.clips[i]?'✓':''; };
        const ct=document.createElement('span'); ct.className='fc-clip-txt'; ct.textContent=clip;
        cr.appendChild(cb); cr.appendChild(ct); clipsDiv.appendChild(cr);
      });
      card.appendChild(clipsDiv);
    }

    grid.appendChild(card);
  });
  return grid;
}

// ── Init & rebuild ────────────────────────────────────
function rebuildAll() {
  document.getElementById('main').innerHTML = '';
  document.getElementById('tab-bar').innerHTML = '';
  const main = document.getElementById('main');
  buildTabs();
  main.appendChild(buildOverview());
  LESSONS.forEach(l => main.appendChild(buildLesson(l)));
  buildNavSheet();
  if (active !== 'overview') setTab(active);
  refreshProgress();
}

document.getElementById('user-label').textContent = CURRENT_USER==='guest' ? 'אורח' : CURRENT_USER;
rebuildAll();
</script>
