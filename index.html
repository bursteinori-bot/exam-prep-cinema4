<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תולדות הקולנוע 4 - הכנה למבחן</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-bold-webfont.ttf') format('truetype'); font-weight:700; }
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-light-webfont.ttf') format('truetype'); font-weight:300; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:400; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:600; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:700; }

    :root {
      --bg:#F2F1EE; --surface:#FFF; --inset:#F7F6F3;
      --border:#E5E4E0; --text:#1C1B19; --muted:#8E8D8A;
      --faint:#C4C3BF; --green:#1A7A52; --green-bg:#E8F5EE; --blue:#1560A8;
    }
    html { font-size: 36px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:"Yehuda","Baskerville",Georgia,serif; min-height:100vh; direction:rtl; -webkit-font-smoothing:antialiased; }

    /* Header */
    header { background:rgba(255,255,255,.92); backdrop-filter:blur(16px); border-bottom:.5px solid var(--border); padding:10px 22px 0; position:sticky; top:0; z-index:200; }
    .header-top { display:flex; align-items:center; justify-content:space-between; gap:12px; padding-bottom:8px; }
    header h1 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.9rem; font-weight:600; color:var(--text); }
    .header-right { display:flex; align-items:center; gap:12px; }
    .progress-pill { display:flex; align-items:center; gap:7px; }
    .progress-track { width:60px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .35s; }
    .progress-pct { font-size:.64rem; font-weight:600; color:var(--text); min-width:26px; }
    .countdown { font-size:.64rem; color:var(--muted); white-space:nowrap; }
    .countdown b { color:var(--text); font-weight:700; }

    /* Tab bar */
    .tab-bar { display:flex; overflow-x:auto; scrollbar-width:none; gap:2px; margin:0 -22px; padding:0 18px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; padding:6px 11px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.7rem; font-family:inherit; cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; margin-bottom:-.5px; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }
    .tab-frac { font-size:.56rem; color:var(--faint); margin-right:2px; }
    .tab-btn.active .tab-frac { color:var(--muted); }
    .tab-divider { width:1px; background:var(--border); margin:5px 4px; flex-shrink:0; }
    .tab-sem-label { font-size:.54rem; color:var(--faint); padding:0 5px; align-self:center; flex-shrink:0; }
    .tab-btn.sem-a { color:#A08840; }
    .tab-btn.sem-a.active { color:#7A6020; border-bottom-color:#A08840; }

    /* Mobile nav */
    .mob-nav { display:none; align-items:center; border-top:.5px solid var(--border); }
    .mob-nav-label { flex:1; padding:9px 14px; font-size:.68rem; font-weight:600; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .mob-nav-label .sub { display:block; font-size:.54rem; color:var(--muted); font-weight:400; margin-top:1px; }
    .mob-menu-btn { padding:9px 14px; background:none; border:none; border-right:.5px solid var(--border); font-size:.85rem; cursor:pointer; color:var(--text); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }

    /* Nav sheet */
    .nav-sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 24px rgba(0,0,0,.14); z-index:302; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .nav-sheet.open { transform:translateY(0); }
    .ns-header { padding:14px 18px 10px; font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.8rem; font-weight:700; border-bottom:.5px solid var(--border); }
    .ns-item { display:flex; align-items:center; gap:10px; padding:11px 18px; border-bottom:.5px solid var(--border); cursor:pointer; transition:background .1s; min-height:50px; }
    .ns-item:hover, .ns-item.active { background:var(--inset); }
    .ns-item.active { font-weight:600; }
    .ns-item-title { font-size:.68rem; color:var(--text); line-height:1.35; }
    .ns-item-frac { font-size:.56rem; color:var(--muted); margin-right:auto; white-space:nowrap; }
    .ns-item.sem-a .ns-item-title { color:#A08840; }

    /* Main */
    main { max-width:100%; padding:18px 14px 50px; }
    .panel { display:none; } .panel.active { display:block; }

    /* Lesson header */
    .lesson-hd { display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:14px; }
    .lesson-hd h2 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:1rem; font-weight:600; color:var(--text); line-height:1.3; flex:1; }
    .lesson-frac { font-size:.64rem; color:var(--muted); white-space:nowrap; }
    .lesson-frac b { color:var(--text); }
    .lesson-subtitle { font-size:.66rem; color:#A08840; margin-top:3px; margin-bottom:10px; }

    /* Section boxes */
    .sec-box { background:var(--surface); border-radius:13px; box-shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04); margin-top:14px; overflow:hidden; }
    .sec-box-hd { display:flex; align-items:center; justify-content:space-between; padding:10px 15px 9px; border-bottom:.5px solid var(--border); }
    .sec-box-hd h3 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.76rem; font-weight:700; color:var(--text); }
    .sec-box-body { padding:10px 13px; }

    /* Film cards */
    .film-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:7px; align-items:start; }
    @media(max-width:900px) { .film-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:580px) { .film-grid { grid-template-columns:repeat(2,1fr); } }

    .fc { background:var(--surface); border-radius:10px; box-shadow:0 1px 3px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.05); padding:8px 9px 7px; display:flex; flex-direction:column; }
    .fc.watched { background:var(--green-bg); }
    .fc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:5px; gap:5px; }
    .fc-check { width:16px; height:16px; min-width:16px; border-radius:50%; border:1.5px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.5rem; color:#fff; transition:background .15s,border-color .15s; flex-shrink:0; margin-top:1px; }
    .fc-check:hover { border-color:var(--green); }
    .fc.watched .fc-check { background:var(--green); border-color:var(--green); }
    .fc-type { font-size:.5rem; font-weight:600; letter-spacing:.03em; padding:1px 5px; border-radius:20px; flex-shrink:0; }
    .fc-type.mandatory { background:rgba(21,96,168,.1); color:var(--blue); }
    .fc-type.clip { background:rgba(0,0,0,.05); color:var(--muted); }
    .fc-title { font-family:"Yehuda","Baskerville",Georgia,serif; font-size:.68rem; font-weight:600; color:var(--text); line-height:1.3; }
    .fc.watched .fc-title { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint); }
    .fc-meta { font-family:"Courier New",monospace; font-size:.5rem; color:var(--faint); margin-top:2px; }
    .fc-clips { margin-top:6px; border-top:.5px solid var(--border); padding-top:5px; display:flex; flex-direction:column; gap:3px; }
    .fc-clip-row { display:flex; align-items:flex-start; gap:5px; }
    .fc-clip-box { width:11px; height:11px; min-width:11px; margin-top:2px; border-radius:2px; border:1.5px solid var(--faint); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.45rem; color:#fff; transition:background .1s,border-color .1s; flex-shrink:0; }
    .fc-clip-box:hover { border-color:var(--text); }
    .fc-clip-row.done .fc-clip-box { background:var(--text); border-color:var(--text); }
    .fc-clip-txt { font-size:.58rem; color:var(--muted); line-height:1.4; }
    .fc-clip-row.done .fc-clip-txt { color:var(--faint); text-decoration:line-through; }

    /* Overview */
    .ov-header { margin-bottom:18px; }
    .ov-header h2 { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:1rem; font-weight:600; margin-bottom:3px; }
    .ov-header p { font-size:.66rem; color:var(--muted); }
    .ov-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:8px; align-items:stretch; }
    @media(max-width:900px) { .ov-grid { grid-template-columns:repeat(4,1fr); } }
    @media(max-width:640px) { .ov-grid { grid-template-columns:repeat(3,1fr) !important; gap:6px; } }
    @media(max-width:420px) { .ov-grid { grid-template-columns:repeat(2,1fr) !important; } }
    .ov-card { background:var(--surface); border-radius:12px; padding:12px 13px; box-shadow:0 1px 4px rgba(0,0,0,.05),0 0 0 .5px rgba(0,0,0,.04); cursor:pointer; transition:box-shadow .15s; display:flex; flex-direction:column; }
    .ov-card:hover { box-shadow:0 3px 10px rgba(0,0,0,.09),0 0 0 .5px rgba(0,0,0,.07); }
    .ov-card.sem-a { background:#FEFCF5; border:.5px solid #E8E0C8; }
    .ov-card.sem-a .ov-num { color:#A08840; }
    .ov-num { font-size:.54rem; color:var(--faint); letter-spacing:.04em; margin-bottom:3px; }
    .ov-title { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.72rem; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:8px; }
    .ov-prog-row { display:flex; align-items:center; gap:7px; margin-bottom:6px; }
    .ov-track { flex:1; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .ov-fill { height:100%; background:var(--text); border-radius:2px; transition:width .3s; }
    .ov-fill.full { background:var(--green); }
    .ov-frac { font-size:.58rem; color:var(--muted); white-space:nowrap; }
    .ov-frac.full { color:var(--green); }
    .ov-films { display:flex; flex-wrap:wrap; gap:4px; margin-top:2px; }
    .ov-film-m { font-size:.55rem; font-weight:600; color:var(--text); background:var(--inset); border:.5px solid var(--border); border-radius:5px; padding:2px 6px; white-space:nowrap; }
    .ov-film-done { color:var(--faint); background:transparent; text-decoration:line-through; }

    /* Summary buttons */
    .sum-btns { display:flex; flex-wrap:wrap; gap:7px; }
    .sum-btn { display:flex; align-items:center; gap:5px; padding:7px 12px; border-radius:9px; border:.5px solid var(--border); background:var(--inset); font-size:.64rem; font-family:inherit; color:var(--text); cursor:pointer; transition:background .12s; }
    .sum-btn:hover { background:var(--border); }

    /* Reading Panel */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.18); z-index:299; opacity:0; pointer-events:none; transition:opacity .25s; }
    .backdrop.open { opacity:1; pointer-events:auto; }
    .reading-panel { position:fixed; bottom:0; right:0; left:0; height:82vh; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 32px rgba(0,0,0,.14); z-index:300; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .reading-panel.open { transform:translateY(0); }
    .rp-header { display:flex; align-items:center; justify-content:space-between; padding:13px 18px 10px; border-bottom:.5px solid var(--border); flex-shrink:0; }
    .rp-title { font-family:"Yehuda","Hoefler Text",Georgia,serif; font-size:.82rem; font-weight:700; color:var(--text); line-height:1.3; }
    .rp-close { width:28px; height:28px; border-radius:50%; border:none; background:var(--inset); color:var(--muted); cursor:pointer; font-size:.68rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .rp-close:hover { background:var(--border); }
    .rp-body { flex:1; overflow-y:auto; padding:16px 20px 36px; direction:rtl; }
    .rp-body::-webkit-scrollbar { width:4px; }
    .rp-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .rp-date { font-family:"Courier New",monospace; font-size:.54rem; color:var(--muted); margin-bottom:12px; }
    .rp-heading { font-size:.72rem; font-weight:700; color:var(--text); margin-top:14px; margin-bottom:3px; line-height:1.4; }
    .rp-para { font-size:.68rem; line-height:1.78; color:var(--text); margin-bottom:5px; direction:rtl; }
    .rp-para.bold { font-weight:700; margin-top:10px; margin-bottom:2px; }
    .rp-list { padding-right:14px; margin-bottom:6px; }
    .rp-li { font-size:.66rem; line-height:1.7; color:var(--text); margin-bottom:2px; direction:rtl; }

    /* Mobile */
    @media(max-width:640px) {
      html { font-size:20px; }
      .tab-bar { display:none; }
      .mob-nav { display:flex; }
      .film-grid { grid-template-columns:1fr !important; gap:6px; }
      .ov-grid { grid-template-columns:1fr !important; gap:6px; }
      .reading-panel { height:92vh; }
    }
    @media(max-width:420px) {
      html { font-size:17px; }
      header { padding:7px 10px 0; }
      main { padding:12px 8px 44px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <h1>תולדות הקולנוע 4</h1>
    <div class="header-right">
      <div class="progress-pill">
        <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
        <span class="progress-pct" id="overall-pct">0%</span>
      </div>
      <span class="countdown"><b id="cd-days">-</b> ימים · 26.7</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="mob-nav" id="mob-nav">
    <button class="mob-menu-btn" id="mob-menu-btn">☰</button>
    <div class="mob-nav-label">
      <span id="mob-nav-main">סקירה</span>
      <span class="sub" id="mob-nav-sub"></span>
    </div>
  </div>
</header>

<div class="backdrop" id="backdrop"></div>
<div class="reading-panel" id="reading-panel">
  <div class="rp-header">
    <span class="rp-title" id="rp-title"></span>
    <button class="rp-close" id="rp-close">✕</button>
  </div>
  <div class="rp-body" id="rp-body"></div>
</div>

<div class="backdrop" id="nav-backdrop" style="z-index:301"></div>
<div class="nav-sheet" id="nav-sheet">
  <div class="ns-header">בחר שיעור</div>
  <div id="ns-list"></div>
</div>

<main id="main"></main>

<script src="data.js"></script>
<script src="summaries.js"></script>
<script src="notion_summaries.js"></script>
<script>
// ── State (simple localStorage) ───────────────────────
const SK = 'cinema4_v1';
function load() { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } }
function save() { localStorage.setItem(SK, JSON.stringify(ST)); }
let ST = load();
function fs(id) {
  if (!ST.films) ST.films={};
  if (!ST.films[id]) ST.films[id]={watched:false,clips:{}};
  return ST.films[id];
}

// ── Countdown ─────────────────────────────────────────
document.getElementById('cd-days').textContent =
  Math.max(0, Math.ceil((EXAM_DATE - new Date()) / 86400000));

// ── Progress ──────────────────────────────────────────
const mandatory = l => l.films.filter(f => f.mandatory);
const watchedCount = l => mandatory(l).filter(f => fs(f.id).watched).length;
const pctOf = (w,t) => t ? Math.round(w/t*100) : 0;
function overallPct() {
  const all = LESSONS.flatMap(mandatory);
  return pctOf(all.filter(f => fs(f.id).watched).length, all.length);
}
function refreshProgress() {
  const p = overallPct();
  document.getElementById('overall-bar').style.width = p+'%';
  document.getElementById('overall-pct').textContent = p+'%';
  LESSONS.forEach(l => {
    const w=watchedCount(l), t=mandatory(l).length;
    const frac = document.querySelector(`.tab-frac[data-l="${l.id}"]`);
    if (frac) frac.textContent = t ? ` ${w}/${t}` : '';
    const card = document.querySelector(`.ov-card[data-l="${l.id}"]`);
    if (card) {
      const p2=pctOf(w,t), fill=card.querySelector('.ov-fill'), fracEl=card.querySelector('.ov-frac');
      if (fill) { fill.style.width=p2+'%'; fill.className='ov-fill'+(p2===100?' full':''); }
      if (fracEl) { fracEl.textContent=`${w} / ${t}`; fracEl.className='ov-frac'+(p2===100?' full':''); }
      card.querySelectorAll('.ov-film-m').forEach(el => {
        const id=el.dataset.fid; if(id) el.className='ov-film-m'+(fs(id).watched?' ov-film-done':'');
      });
    }
  });
}

// ── Markdown renderer ─────────────────────────────────
function renderMd(text, container) {
  let ul = null;
  text.split('\n').forEach(line => {
    if (!line.trim()) { ul=null; return; }
    if (line.startsWith('### ')) {
      const el=document.createElement('div'); el.className='rp-heading'; el.textContent=line.slice(4);
      container.appendChild(el); ul=null;
    } else if (/^\*\*[^*]+\*\*$/.test(line)) {
      const el=document.createElement('div'); el.className='rp-heading'; el.textContent=line.slice(2,-2);
      container.appendChild(el); ul=null;
    } else if (line.startsWith('- ')) {
      if (!ul) { ul=document.createElement('ul'); ul.className='rp-list'; container.appendChild(ul); }
      const li=document.createElement('li'); li.className='rp-li';
      li.innerHTML=line.slice(2).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      ul.appendChild(li);
    } else {
      const el=document.createElement('div'); el.className='rp-para';
      el.innerHTML=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
      container.appendChild(el); ul=null;
    }
  });
}

// ── Reading Panel ─────────────────────────────────────
const rpanel=document.getElementById('reading-panel'), backdrop=document.getElementById('backdrop');
const rpTitle=document.getElementById('rp-title'), rpBody=document.getElementById('rp-body');
function openRP(title, buildFn) { rpTitle.textContent=title; rpBody.innerHTML=''; buildFn(rpBody); rpanel.classList.add('open'); backdrop.classList.add('open'); }
function closeRP() { rpanel.classList.remove('open'); backdrop.classList.remove('open'); }
document.getElementById('rp-close').onclick = closeRP;
backdrop.onclick = closeRP;
document.addEventListener('keydown', e => { if(e.key==='Escape'){closeRP();closeNavSheet();} });

// ── הגר mapping ───────────────────────────────────────
const HAGAR_MAP = {1:['1'],2:['2','3'],3:['4','5'],4:['6','7'],5:[],6:['9'],7:['10','11']};
function getHagarParas(lid) {
  return (HAGAR_MAP[lid]||[]).flatMap(k=>(SUMMARIES[k]||[]).slice(1));
}

// ── Tabs ──────────────────────────────────────────────
let active='overview';
function setTab(id) {
  active=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.p===id));
  const mainEl=document.getElementById('mob-nav-main'), subEl=document.getElementById('mob-nav-sub');
  if (id==='overview') { mainEl.textContent='סקירה'; subEl.textContent=''; }
  else {
    const l=LESSONS.find(l=>String(l.id)===id.slice(1));
    if(l){ mainEl.textContent=(l.semester?'נושא ':'שיעור ')+l.id; subEl.textContent=l.title; }
  }
  document.querySelectorAll('.ns-item').forEach(it=>it.classList.toggle('active',it.dataset.t===id));
  closeNavSheet();
}

// ── Nav sheet (mobile) ────────────────────────────────
const navSheet=document.getElementById('nav-sheet'), navBackdrop=document.getElementById('nav-backdrop');
function openNavSheet() { navSheet.classList.add('open'); navBackdrop.classList.add('open'); }
function closeNavSheet() { navSheet.classList.remove('open'); navBackdrop.classList.remove('open'); }
document.getElementById('mob-menu-btn').onclick = openNavSheet;
navBackdrop.onclick = closeNavSheet;

function buildNavSheet() {
  const list=document.getElementById('ns-list'); list.innerHTML='';
  const mkItem=(t,title,sub,cls='')=>{
    const div=document.createElement('div');
    div.className='ns-item'+(active===t?' active':'')+(cls?' '+cls:''); div.dataset.t=t;
    div.innerHTML=`<div class="ns-item-title">${title}${sub?`<br><span style="font-size:.54rem;color:var(--muted);font-weight:400">${sub}</span>`:''}</div>`;
    div.onclick=()=>setTab(t); list.appendChild(div);
  };
  mkItem('overview','סקירה כללית','');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkItem(`l${l.id}`,'נושא '+l.id,l.title,'sem-a'));
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    const div=document.createElement('div');
    div.className='ns-item'+(active===`l${l.id}`?' active':''); div.dataset.t=`l${l.id}`;
    div.innerHTML=`<div class="ns-item-title">שיעור ${l.id}<br><span style="font-size:.54rem;color:var(--muted);font-weight:400">${l.title}</span></div>${t?`<span class="ns-item-frac">${w}/${t}</span>`:''}`;
    div.onclick=()=>setTab(`l${l.id}`); list.appendChild(div);
  });
}

function buildTabs() {
  const bar=document.getElementById('tab-bar');
  const mkBtn=(t,l,e='',cls='')=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(t==='overview'?' active':'')+(cls?' '+cls:'');
    b.dataset.t=t; b.innerHTML=l+e; b.onclick=()=>setTab(t); bar.appendChild(b);
  };
  const mkD=()=>{const d=document.createElement('div');d.className='tab-divider';bar.appendChild(d);};
  const mkL=txt=>{const s=document.createElement('span');s.className='tab-sem-label';s.textContent=txt;bar.appendChild(s);};
  mkBtn('overview','סקירה');
  mkD(); mkL('סמ׳ א');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkBtn(`l${l.id}`,l.id,'','sem-a'));
  mkD(); mkL('סמ׳ ב');
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    mkBtn(`l${l.id}`,`${l.id}`,t?`<span class="tab-frac" data-l="${l.id}"> ${w}/${t}</span>`:'');
  });
}

// ── Overview ──────────────────────────────────────────
function buildOverview() {
  const panel=document.createElement('div'); panel.className='panel active'; panel.dataset.p='overview';
  const allM=LESSONS.flatMap(mandatory).length;
  panel.innerHTML=`<div class="ov-header"><h2>הכנה למבחן</h2><p>${allM} סרטי חובה · ${LESSONS.filter(l=>!l.semester).length} שיעורי סמ׳ ב · 2 נושאי סמ׳ א · מבחן 26.7</p></div>`;
  const grid=document.createElement('div'); grid.className='ov-grid';
  const decade={1:'1960',2:'1959-63',3:'1959-65',4:'1959-64',5:'1958-64',6:'1972-85',7:'1966-71',8:'1966-70',9:'1966-75',10:'1962-69',11:'1968-73'};

  LESSONS.filter(l=>l.semester==='א').forEach(l=>{
    const card=document.createElement('div'); card.className='ov-card sem-a'; card.dataset.l=l.id;
    card.innerHTML=`<div class="ov-num">נושא ${l.id}</div><div class="ov-title">${l.title}</div>${l.subtitle?`<div style="font-size:.5rem;color:#A08840;margin-bottom:6px">${l.subtitle}</div>`:''}<div class="ov-films">${l.films.map(f=>`<span class="ov-film-m">${f.title.split(':')[1]?.trim()||f.title}</span>`).join('')}</div>`;
    card.onclick=()=>setTab(`l${l.id}`); grid.appendChild(card);
  });

  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length,p=pctOf(w,t);
    const card=document.createElement('div'); card.className='ov-card'; card.dataset.l=l.id;
    const fh=mandatory(l).map(f=>`<span class="ov-film-m${fs(f.id).watched?' ov-film-done':''}" data-fid="${f.id}">${f.title.split('/')[0].trim()}</span>`).join('');
    card.innerHTML=`<div class="ov-num">שיעור ${l.id} · ${decade[l.id]||''}</div><div class="ov-title">${l.title}</div><div class="ov-prog-row"><div class="ov-track"><div class="ov-fill${p===100?' full':''}" style="width:${p}%"></div></div><span class="ov-frac${p===100?' full':''}">${w} / ${t}</span></div><div class="ov-films">${fh}</div>`;
    card.onclick=()=>setTab(`l${l.id}`); grid.appendChild(card);
  });

  panel.appendChild(grid); return panel;
}

// ── Lesson panel ──────────────────────────────────────
function buildLesson(l) {
  const panel=document.createElement('div'); panel.className='panel'; panel.dataset.p=`l${l.id}`;
  const w=watchedCount(l),t=mandatory(l).length;
  const hd=document.createElement('div'); hd.className='lesson-hd';
  hd.innerHTML=`<h2>${l.semester?'נושא '+l.id:'שיעור '+l.id} - ${l.title}</h2>${t?`<span class="lesson-frac"><b>${w}</b> / ${t} נצפו</span>`:''}`;
  panel.appendChild(hd);
  if (l.subtitle){const s=document.createElement('div');s.className='lesson-subtitle';s.textContent=l.subtitle;panel.appendChild(s);}

  // Summaries first
  const hagarParas=getHagarParas(l.id), hasHagar=hagarParas.length>0;
  const notionData=typeof NOTION_SUMMARIES!=='undefined'&&NOTION_SUMMARIES[String(l.id)];
  if (hasHagar||notionData) {
    const sumBox=document.createElement('div'); sumBox.className='sec-box';
    sumBox.innerHTML=`<div class="sec-box-hd"><h3>סיכומים</h3></div>`;
    const sumBody=document.createElement('div'); sumBody.className='sec-box-body';
    const btns=document.createElement('div'); btns.className='sum-btns';
    if (hasHagar) {
      const b=document.createElement('button'); b.className='sum-btn'; b.textContent='סיכום הגר';
      b.onclick=()=>openRP('סיכום הגר - שיעור '+(l.semester?'נושא ':'')+l.id, body=>{
        const keys=HAGAR_MAP[l.id]||[];
        if(keys.length){const d=document.createElement('p');d.className='rp-date';d.textContent=keys.map(k=>(SUMMARIES[k]||[])[0]?.text).filter(Boolean).join(' + ');body.appendChild(d);}
        hagarParas.forEach(p=>{const el=document.createElement('p');el.className='rp-para'+(p.bold?' bold':'');el.textContent=p.text;body.appendChild(el);});
      }); btns.appendChild(b);
    }
    if (notionData&&notionData.length) {
      const b=document.createElement('button'); b.className='sum-btn';
      b.textContent=notionData.length>1?`הקלטה (${notionData.length})`:'הקלטה';
      b.onclick=()=>openRP('הקלטה', body=>{
        notionData.forEach((note,i)=>{
          if(i>0){const hr=document.createElement('hr');hr.style.cssText='border:none;border-top:1px solid var(--border);margin:14px 0';body.appendChild(hr);}
          const d=document.createElement('p');d.className='rp-date';d.textContent=note.date+' · '+note.title;body.appendChild(d);
          renderMd(note.text,body);
        });
      }); btns.appendChild(b);
    }
    sumBody.appendChild(btns); sumBox.appendChild(sumBody); panel.appendChild(sumBox);
  }

  // Films
  const filmsBox=document.createElement('div'); filmsBox.className='sec-box';
  filmsBox.innerHTML=`<div class="sec-box-hd"><h3>צפייה בסרטים</h3></div>`;
  const filmsBody=document.createElement('div'); filmsBody.className='sec-box-body';
  const grid=document.createElement('div'); grid.className='film-grid';

  l.films.forEach(film=>{
    const s=fs(film.id), card=document.createElement('div');
    card.className='fc'+(s.watched?' watched':'');
    const meta=[film.director,film.year,film.duration?film.duration+"′":null].filter(Boolean).join(' · ');
    const top=document.createElement('div'); top.className='fc-top';
    const check=document.createElement('button'); check.className='fc-check'; check.textContent=s.watched?'✓':'';
    const titleEl=document.createElement('div'); titleEl.className='fc-title'; titleEl.textContent=film.title;
    if(s.watched){titleEl.style.textDecoration='line-through';titleEl.style.color='var(--muted)';}
    check.onclick=()=>{
      const s2=fs(film.id); s2.watched=!s2.watched; save();
      card.classList.toggle('watched',s2.watched); check.textContent=s2.watched?'✓':'';
      titleEl.style.textDecoration=s2.watched?'line-through':''; titleEl.style.color=s2.watched?'var(--muted)':'';
      const frac=panel.querySelector('.lesson-frac');
      if(frac){const ww=watchedCount(l),tt=mandatory(l).length;frac.innerHTML=`<b>${ww}</b> / ${tt} נצפו`;}
      refreshProgress();
    };
    const typeEl=document.createElement('span'); typeEl.className='fc-type '+(film.mandatory?'mandatory':'clip');
    typeEl.textContent=film.mandatory?'חובה':'(קטע)';
    top.appendChild(check); top.appendChild(typeEl); card.appendChild(top); card.appendChild(titleEl);
    if(meta){const m=document.createElement('div');m.className='fc-meta';m.textContent=meta;card.appendChild(m);}
    if(film.clips.length){
      const cd=document.createElement('div'); cd.className='fc-clips';
      film.clips.forEach((clip,i)=>{
        const cr=document.createElement('div'); cr.className='fc-clip-row'+(s.clips[i]?' done':'');
        const cb=document.createElement('button'); cb.className='fc-clip-box'; cb.textContent=s.clips[i]?'✓':'';
        cb.onclick=()=>{const s2=fs(film.id);s2.clips[i]=!s2.clips[i];save();cr.classList.toggle('done',!!s2.clips[i]);cb.textContent=s2.clips[i]?'✓':'';};
        const ct=document.createElement('span'); ct.className='fc-clip-txt'; ct.textContent=clip;
        cr.appendChild(cb); cr.appendChild(ct); cd.appendChild(cr);
      }); card.appendChild(cd);
    }
    grid.appendChild(card);
  });

  filmsBody.appendChild(grid); filmsBox.appendChild(filmsBody); panel.appendChild(filmsBox);
  return panel;
}

// ── Init ──────────────────────────────────────────────
buildTabs(); buildNavSheet();
const main=document.getElementById('main');
main.appendChild(buildOverview());
LESSONS.forEach(l=>main.appendChild(buildLesson(l)));
refreshProgress();
</script>
</body>
