<!DOCTYPE html>
<html lang="he" dir="rtl" data-theme="light" data-font="classic">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תולדות הקולנוע 4 - הכנה למבחן</title>
  <style>
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-bold-webfont.ttf') format('truetype'); font-weight:700; }
    @font-face { font-family:'Yehuda'; src:url('fonts/yehudaclm-light-webfont.ttf') format('truetype'); font-weight:300; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:400; }
    @font-face { font-family:'Baskerville'; src:local('Baskerville'); font-weight:600 700; }

    /* ── Theme variables ── */
    :root {
      --bg:#F2F1EE; --surface:#FFF; --inset:#F7F6F3;
      --border:#E5E4E0; --text:#1C1B19; --muted:#8E8D8A;
      --faint:#C4C3BF; --green:#1A7A52; --green-bg:#E8F5EE; --blue:#1560A8;
      --header-bg:rgba(255,255,255,.92);
      --shadow:0 1px 4px rgba(0,0,0,.06),0 0 0 .5px rgba(0,0,0,.05);
      --days-bg:#1C1B19; --days-text:#FFF;
    }
    [data-theme="dark"] {
      --bg:#141413; --surface:#1E1D1B; --inset:#252420;
      --border:#333230; --text:#E8E6E0; --muted:#8A8880;
      --faint:#4A4845; --green:#2EBD76; --green-bg:#0D2B1E; --blue:#4B94D8;
      --header-bg:rgba(20,20,19,.92);
      --days-bg:#E8E6E0; --days-text:#1C1B19;
    }

    /* ── Font stacks ── */
    [data-font="classic"] {
      --f-body:"Yehuda","Baskerville",Georgia,serif;
      --f-head:"Yehuda","Hoefler Text",Georgia,serif;
      --f-mono:"Courier New",monospace;
    }
    [data-font="modern"] {
      --f-body:-apple-system,"Segoe UI",Arial,sans-serif;
      --f-head:-apple-system,"Segoe UI",Arial,sans-serif;
      --f-mono:"SF Mono","Fira Code","Courier New",monospace;
    }
    [data-font="elegant"] {
      --f-body:"Palatino","Hoefler Text",Georgia,serif;
      --f-head:"Hoefler Text",Palatino,Georgia,serif;
      --f-mono:"Courier New",monospace;
    }

    html { font-size:36px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { background:var(--bg); color:var(--text); font-family:var(--f-body); min-height:100vh; direction:rtl; -webkit-font-smoothing:antialiased; transition:background .2s,color .2s; }

    /* ── Header ── */
    header { background:var(--header-bg); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-bottom:.5px solid var(--border); padding:10px 16px 0; position:sticky; top:0; z-index:200; }
    .header-top { display:flex; align-items:center; gap:10px; padding-bottom:8px; }

    header h1 { font-family:var(--f-head); font-size:.85rem; font-weight:600; color:var(--text); flex:1; }

    /* Days badge */
    .days-badge { display:flex; flex-direction:column; align-items:center; background:var(--days-bg); color:var(--days-text); border-radius:10px; padding:3px 8px; min-width:44px; flex-shrink:0; }
    .days-badge .num { font-family:var(--f-mono); font-size:.72rem; font-weight:700; line-height:1; }
    .days-badge .lbl { font-size:.38rem; letter-spacing:.04em; opacity:.7; margin-top:1px; }

    /* Progress */
    .progress-pill { display:flex; align-items:center; gap:6px; }
    .progress-track { width:48px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
    .progress-fill { height:100%; background:var(--text); border-radius:2px; transition:width .35s; }
    .progress-pct { font-size:.58rem; font-weight:600; color:var(--text); min-width:26px; font-family:var(--f-mono); }

    /* Settings btn */
    .settings-btn { width:34px; height:34px; border-radius:8px; border:.5px solid var(--border); background:var(--surface); color:var(--text); cursor:pointer; font-size:.75rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:background .12s; }
    .settings-btn:hover { background:var(--inset); }

    /* Tab bar */
    .tab-bar { display:flex; overflow-x:auto; scrollbar-width:none; gap:0; margin:0 -16px; padding:0 12px; }
    .tab-bar::-webkit-scrollbar { display:none; }
    .tab-btn { flex-shrink:0; padding:6px 10px; background:none; border:none; border-bottom:2px solid transparent; color:var(--muted); font-size:.62rem; font-family:var(--f-body); cursor:pointer; white-space:nowrap; transition:color .15s,border-color .15s; margin-bottom:-.5px; text-align:right; }
    .tab-btn:hover { color:var(--text); }
    .tab-btn.active { color:var(--text); font-weight:600; border-bottom-color:var(--text); }
    .tab-btn .tab-num { display:block; font-size:.44rem; color:var(--faint); font-family:var(--f-mono); margin-bottom:1px; }
    .tab-btn.active .tab-num { color:var(--muted); }
    .tab-btn .tab-title { display:block; }
    .tab-btn .tab-frac { font-size:.44rem; color:var(--faint); }
    .tab-btn.active .tab-frac { color:var(--muted); }
    .tab-divider { width:1px; background:var(--border); margin:5px 3px; flex-shrink:0; }
    .tab-sem-label { font-size:.5rem; color:var(--faint); padding:0 4px; align-self:center; flex-shrink:0; white-space:nowrap; }
    .tab-btn.sem-a .tab-num { color:#C4A84A; }
    .tab-btn.sem-a.active { color:#A08840; border-bottom-color:#A08840; }

    /* Mobile nav */
    .mob-nav { display:none; align-items:center; border-top:.5px solid var(--border); }
    .mob-nav-label { flex:1; padding:8px 12px; overflow:hidden; }
    .mob-nav-label .mn-num { font-size:.5rem; color:var(--muted); font-family:var(--f-mono); display:block; }
    .mob-nav-label .mn-title { font-size:.66rem; font-weight:600; color:var(--text); display:block; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .mob-menu-btn { padding:8px 14px; background:none; border:none; border-right:.5px solid var(--border); font-size:.8rem; cursor:pointer; color:var(--text); min-width:44px; min-height:44px; display:flex; align-items:center; justify-content:center; }

    /* Nav sheet */
    .nav-sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 24px rgba(0,0,0,.18); z-index:302; max-height:80vh; overflow-y:auto; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .nav-sheet.open { transform:translateY(0); }
    .ns-header { padding:12px 16px 8px; font-family:var(--f-head); font-size:.75rem; font-weight:700; border-bottom:.5px solid var(--border); }
    .ns-item { display:flex; align-items:center; padding:10px 16px; border-bottom:.5px solid var(--border); cursor:pointer; transition:background .1s; min-height:48px; gap:8px; }
    .ns-item:hover, .ns-item.active { background:var(--inset); }
    .ns-item-num { font-size:.5rem; color:var(--faint); font-family:var(--f-mono); min-width:24px; flex-shrink:0; }
    .ns-item-title { font-size:.66rem; color:var(--text); line-height:1.3; flex:1; }
    .ns-item.active .ns-item-title { font-weight:600; }
    .ns-item-frac { font-size:.54rem; color:var(--muted); white-space:nowrap; font-family:var(--f-mono); }
    .ns-item.sem-a .ns-item-title { color:#A08840; }

    /* Main */
    main { max-width:100%; padding:16px 12px 56px; }
    .panel { display:none; } .panel.active { display:block; }

    /* Lesson header */
    .lesson-hd { margin-bottom:14px; }
    .lesson-hd .l-num { font-size:.54rem; color:var(--faint); font-family:var(--f-mono); letter-spacing:.06em; margin-bottom:2px; }
    .lesson-hd h2 { font-family:var(--f-head); font-size:1rem; font-weight:600; color:var(--text); line-height:1.3; }
    .lesson-hd .l-frac { font-size:.58rem; color:var(--muted); margin-top:3px; font-family:var(--f-mono); }
    .lesson-hd .l-frac b { color:var(--text); }
    .lesson-subtitle { font-size:.62rem; color:#A08840; margin-top:2px; margin-bottom:10px; }

    /* Section boxes */
    .sec-box { background:var(--surface); border-radius:12px; box-shadow:var(--shadow); margin-top:12px; overflow:hidden; }
    .sec-box-hd { padding:9px 13px 8px; border-bottom:.5px solid var(--border); }
    .sec-box-hd h3 { font-family:var(--f-head); font-size:.7rem; font-weight:700; color:var(--text); }
    .sec-box-body { padding:9px 12px; }

    /* Film cards */
    .film-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:6px; align-items:start; }
    @media(max-width:900px) { .film-grid { grid-template-columns:repeat(3,1fr); } }
    @media(max-width:580px) { .film-grid { grid-template-columns:repeat(2,1fr); } }

    .fc { background:var(--surface); border-radius:10px; box-shadow:var(--shadow); padding:8px 9px 7px; display:flex; flex-direction:column; transition:box-shadow .15s; }
    .fc.watched { background:var(--green-bg); }
    .fc-top { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:4px; gap:4px; }
    .fc-check { width:18px; height:18px; min-width:18px; border-radius:50%; border:1.5px solid var(--border); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.52rem; color:#fff; transition:background .15s,border-color .15s; flex-shrink:0; margin-top:1px; }
    .fc-check:hover { border-color:var(--green); }
    .fc.watched .fc-check { background:var(--green); border-color:var(--green); }
    .fc-type { font-size:.48rem; font-weight:600; letter-spacing:.03em; padding:1px 5px; border-radius:20px; flex-shrink:0; }
    .fc-type.mandatory { background:rgba(21,96,168,.12); color:var(--blue); }
    .fc-type.clip { background:rgba(128,128,128,.1); color:var(--muted); }
    .fc-title { font-family:var(--f-head); font-size:.66rem; font-weight:600; color:var(--text); line-height:1.3; }
    .fc.watched .fc-title { color:var(--muted); text-decoration:line-through; text-decoration-color:var(--faint); }
    .fc-meta { font-family:var(--f-mono); font-size:.48rem; color:var(--faint); margin-top:2px; }
    .fc-clips { margin-top:5px; border-top:.5px solid var(--border); padding-top:4px; display:flex; flex-direction:column; gap:3px; }
    .fc-clip-row { display:flex; align-items:flex-start; gap:5px; }
    .fc-clip-box { width:11px; height:11px; min-width:11px; margin-top:2px; border-radius:2px; border:1.5px solid var(--faint); background:none; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:.44rem; color:#fff; transition:background .1s,border-color .1s; flex-shrink:0; }
    .fc-clip-box:hover { border-color:var(--text); }
    .fc-clip-row.done .fc-clip-box { background:var(--text); border-color:var(--text); }
    .fc-clip-txt { font-size:.56rem; color:var(--muted); line-height:1.4; }
    .fc-clip-row.done .fc-clip-txt { color:var(--faint); text-decoration:line-through; }

    /* Overview */
    .ov-header { margin-bottom:16px; }
    .ov-header h2 { font-family:var(--f-head); font-size:.95rem; font-weight:600; margin-bottom:2px; }
    .ov-header p { font-size:.58rem; color:var(--muted); }
    .ov-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; align-items:stretch; }
    @media(max-width:900px) { .ov-grid { grid-template-columns:repeat(4,1fr); } }
    @media(max-width:640px) { .ov-grid { grid-template-columns:repeat(2,1fr) !important; gap:6px; } }
    .ov-card { background:var(--surface); border-radius:11px; padding:11px 12px; box-shadow:var(--shadow); cursor:pointer; transition:box-shadow .15s; display:flex; flex-direction:column; }
    .ov-card:hover { box-shadow:0 3px 12px rgba(0,0,0,.1); }
    .ov-card.sem-a { background:var(--surface); border:.5px solid #C4A84A44; }
    .ov-num { font-size:.48rem; color:var(--faint); font-family:var(--f-mono); margin-bottom:2px; }
    .ov-card.sem-a .ov-num { color:#C4A84A; }
    .ov-title { font-family:var(--f-head); font-size:.68rem; font-weight:600; color:var(--text); line-height:1.35; margin-bottom:7px; }
    .ov-prog-row { display:flex; align-items:center; gap:6px; margin-bottom:5px; }
    .ov-track { flex:1; height:2.5px; background:var(--border); border-radius:2px; overflow:hidden; }
    .ov-fill { height:100%; background:var(--text); border-radius:2px; transition:width .3s; }
    .ov-fill.full { background:var(--green); }
    .ov-frac { font-size:.52rem; color:var(--muted); white-space:nowrap; font-family:var(--f-mono); }
    .ov-frac.full { color:var(--green); }
    .ov-films { display:flex; flex-wrap:wrap; gap:3px; }
    .ov-film-m { font-size:.52rem; font-weight:600; color:var(--text); background:var(--inset); border:.5px solid var(--border); border-radius:4px; padding:1px 5px; white-space:nowrap; }
    .ov-film-done { color:var(--faint); background:transparent; text-decoration:line-through; }

    /* Reading Panel */
    .backdrop { position:fixed; inset:0; background:rgba(0,0,0,.2); z-index:299; opacity:0; pointer-events:none; transition:opacity .25s; }
    .backdrop.open { opacity:1; pointer-events:auto; }
    .sheet { position:fixed; bottom:0; right:0; left:0; background:var(--surface); border-radius:18px 18px 0 0; box-shadow:0 -4px 32px rgba(0,0,0,.18); z-index:300; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .28s cubic-bezier(.32,.72,0,1); }
    .sheet.open { transform:translateY(0); }
    .sheet-tall { height:84vh; }
    .sheet-auto { max-height:60vh; overflow-y:auto; }
    .sheet-hd { display:flex; align-items:center; justify-content:space-between; padding:12px 16px 10px; border-bottom:.5px solid var(--border); flex-shrink:0; }
    .sheet-title { font-family:var(--f-head); font-size:.76rem; font-weight:700; color:var(--text); }
    .sheet-close { width:28px; height:28px; border-radius:50%; border:none; background:var(--inset); color:var(--muted); cursor:pointer; font-size:.65rem; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .sheet-body { flex:1; overflow-y:auto; padding:14px 18px 36px; direction:rtl; }
    .sheet-body::-webkit-scrollbar { width:3px; }
    .sheet-body::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    .rp-date { font-family:var(--f-mono); font-size:.52rem; color:var(--muted); margin-bottom:10px; }
    .rp-heading { font-size:.68rem; font-weight:700; color:var(--text); margin-top:13px; margin-bottom:2px; }
    .rp-para { font-size:.62rem; line-height:1.75; color:var(--text); margin-bottom:4px; direction:rtl; }
    .rp-para.bold { font-weight:700; margin-top:9px; margin-bottom:1px; }
    .rp-list { padding-right:13px; margin-bottom:5px; }
    .rp-li { font-size:.6rem; line-height:1.7; color:var(--text); margin-bottom:2px; direction:rtl; }

    /* Settings panel */
    .settings-body { padding:16px; }
    .set-section { margin-bottom:18px; }
    .set-label { font-size:.6rem; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin-bottom:8px; }
    .set-row { display:flex; gap:8px; flex-wrap:wrap; }
    .set-opt { padding:8px 14px; border-radius:8px; border:.5px solid var(--border); background:var(--inset); font-size:.65rem; font-family:var(--f-body); color:var(--text); cursor:pointer; transition:all .12s; }
    .set-opt:hover { border-color:var(--text); }
    .set-opt.active { background:var(--text); color:var(--bg); border-color:var(--text); }

    /* Toast */
    .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(80px); background:var(--text); color:var(--bg); border-radius:12px; padding:10px 16px; font-size:.6rem; line-height:1.5; z-index:500; opacity:0; transition:all .3s; max-width:88vw; text-align:center; pointer-events:none; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* Mobile */
    @media(max-width:820px) {
      .tab-bar { display:none; }
      .mob-nav { display:flex; }
      .film-grid { grid-template-columns:1fr !important; }
      .ov-grid { grid-template-columns:1fr !important; }
      .sheet-tall { height:92vh; }
    }
    @media(max-width:480px) { html { font-size:22px; } header { padding:8px 12px 0; } main { padding:12px 10px 48px; } }
    @media(max-width:360px) { html { font-size:19px; } }
  </style>
</head>
<body>

<header>
  <div class="header-top">
    <button class="settings-btn" id="settings-btn" title="הגדרות">⚙</button>
    <h1>תולדות הקולנוע 4</h1>
    <div class="progress-pill">
      <div class="progress-track"><div class="progress-fill" id="overall-bar" style="width:0%"></div></div>
      <span class="progress-pct" id="overall-pct">0%</span>
    </div>
    <div class="days-badge">
      <span class="num" id="cd-days">-</span>
      <span class="lbl">ימים</span>
    </div>
  </div>
  <div class="tab-bar" id="tab-bar"></div>
  <div class="mob-nav" id="mob-nav">
    <button class="mob-menu-btn" id="mob-menu-btn">☰</button>
    <div class="mob-nav-label">
      <span class="mn-num" id="mob-nav-num"></span>
      <span class="mn-title" id="mob-nav-title">סקירה</span>
    </div>
  </div>
</header>

<!-- Backdrops -->
<div class="backdrop" id="backdrop"></div>
<div class="backdrop" id="nav-backdrop" style="z-index:301"></div>
<div class="backdrop" id="set-backdrop" style="z-index:301"></div>

<!-- Reading panel -->
<div class="sheet sheet-tall" id="reading-panel">
  <div class="sheet-hd">
    <span class="sheet-title" id="rp-title"></span>
    <button class="sheet-close" id="rp-close">✕</button>
  </div>
  <div class="sheet-body" id="rp-body"></div>
</div>

<!-- Nav sheet (mobile) -->
<div class="nav-sheet" id="nav-sheet">
  <div class="ns-header">בחר נושא</div>
  <div id="ns-list"></div>
</div>

<!-- Settings sheet -->
<div class="sheet sheet-auto" id="settings-panel">
  <div class="sheet-hd">
    <span class="sheet-title">הגדרות</span>
    <button class="sheet-close" id="set-close">✕</button>
  </div>
  <div class="settings-body">
    <div class="set-section">
      <div class="set-label">מצב תצוגה</div>
      <div class="set-row">
        <button class="set-opt" data-theme="light" onclick="setTheme('light')">☀️ בהיר</button>
        <button class="set-opt" data-theme="dark" onclick="setTheme('dark')">🌙 כהה</button>
      </div>
    </div>
    <div class="set-section">
      <div class="set-label">פונט</div>
      <div class="set-row">
        <button class="set-opt" data-font="classic" onclick="setFont('classic')">יהודה קלאסי</button>
        <button class="set-opt" data-font="modern" onclick="setFont('modern')">מודרני</button>
        <button class="set-opt" data-font="elegant" onclick="setFont('elegant')">אלגנטי</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<main id="main"></main>

<script src="data.js"></script>
<script src="summaries.js"></script>
<script src="notion_summaries.js"></script>
<script>
// ── Settings ──────────────────────────────────────────
function setTheme(t) {
  document.documentElement.setAttribute('data-theme', t);
  localStorage.setItem('c4_theme', t);
  document.querySelectorAll('[data-theme]').forEach(b => b.classList.toggle('active', b.dataset.theme===t));
}
function setFont(f) {
  document.documentElement.setAttribute('data-font', f);
  localStorage.setItem('c4_font', f);
  document.querySelectorAll('[data-font]').forEach(b => b.classList.toggle('active', b.dataset.font===f));
}
(function initSettings() {
  const t = localStorage.getItem('c4_theme')||'light';
  const f = localStorage.getItem('c4_font')||'classic';
  document.documentElement.setAttribute('data-theme', t);
  document.documentElement.setAttribute('data-font', f);
  setTimeout(() => {
    document.querySelectorAll('[data-theme]').forEach(b=>b.classList.toggle('active',b.dataset.theme===t));
    document.querySelectorAll('[data-font]').forEach(b=>b.classList.toggle('active',b.dataset.font===f));
  }, 0);
})();

// ── State ─────────────────────────────────────────────
const SK = 'cinema4_v1';
function load() { try { return JSON.parse(localStorage.getItem(SK))||{}; } catch { return {}; } }
function save() { localStorage.setItem(SK, JSON.stringify(ST)); }
let ST = load();
function fs(id) {
  if (!ST.films) ST.films={};
  if (!ST.films[id]) ST.films[id]={watched:false,clips:{}};
  return ST.films[id];
}

// ── Funny comments ────────────────────────────────────
const JOKES = {
  avventura: ["היא נעלמה. הסרט ממשיך. הקולנוע לא חיכה לאף אחד 🏝️"],
  blowup: ["הגדלת עוד פעם? עוד פעם? הסרט מנצח 📸"],
  la_notte: ["לילה ארוך? זה רק 2 שעות. בניגוד לחיי הנישואין שם..."],
  eclisse: ["סיקוונס הסיום? 7 דקות ללא דמויות. גאונות. או עצלות. אתה תחליט ⚡"],

function showJoke(filmId) {
  const list = JOKES[filmId];
  if (!list) return;
  const msg = list[Math.floor(Math.random()*list.length)];
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3200);
}

// ── Progress ──────────────────────────────────────────
const mandatory = l => l.films.filter(f => f.mandatory);
const watchedCount = l => mandatory(l).filter(f => fs(f.id).watched).length;
const pctOf = (w,t) => t ? Math.round(w/t*100) : 0;
function overallPct() {
  const all = LESSONS.flatMap(mandatory);
  return pctOf(all.filter(f => fs(f.id).watched).length, all.length);
}
function refreshProgress() {
  const p = overallPct();
  document.getElementById('overall-bar').style.width = p+'%';
  document.getElementById('overall-pct').textContent = p+'%';
  LESSONS.forEach(l => {
    const w=watchedCount(l), t=mandatory(l).length;
    const frac = document.querySelector(`.tab-frac[data-l="${l.id}"]`);
    if (frac) frac.textContent = t ? `${w}/${t}` : '';
    const card = document.querySelector(`.ov-card[data-l="${l.id}"]`);
    if (card) {
      const p2=pctOf(w,t), fill=card.querySelector('.ov-fill'), fracEl=card.querySelector('.ov-frac');
      if (fill){fill.style.width=p2+'%';fill.className='ov-fill'+(p2===100?' full':'');}
      if (fracEl){fracEl.textContent=t?`${w}/${t}`:'';fracEl.className='ov-frac'+(p2===100?' full':'');}
      card.querySelectorAll('.ov-film-m').forEach(el=>{const id=el.dataset.fid;if(id)el.className='ov-film-m'+(fs(id).watched?' ov-film-done':'');});
    }
  });
}

// ── Markdown renderer ─────────────────────────────────
function renderMd(text, container) {
  let ul=null;
  text.split('\n').forEach(line => {
    if (!line.trim()){ul=null;return;}
    if (line.startsWith('### ')){const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(4);container.appendChild(el);ul=null;}
    else if (/^\*\*[^*]+\*\*$/.test(line)){const el=document.createElement('div');el.className='rp-heading';el.textContent=line.slice(2,-2);container.appendChild(el);ul=null;}
    else if (line.startsWith('- ')){if(!ul){ul=document.createElement('ul');ul.className='rp-list';container.appendChild(ul);}const li=document.createElement('li');li.className='rp-li';li.innerHTML=line.slice(2).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');ul.appendChild(li);}
    else{const el=document.createElement('div');el.className='rp-para';el.innerHTML=line.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');container.appendChild(el);ul=null;}
  });
}

// ── Tabs ──────────────────────────────────────────────
let active='overview';
function setTab(id) {
  active=id;
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.t===id));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active',p.dataset.p===id));
  const numEl=document.getElementById('mob-nav-num'), titleEl=document.getElementById('mob-nav-title');
  if(id==='overview'){numEl.textContent='';titleEl.textContent='סקירה';}
  else{const l=LESSONS.find(l=>String(l.id)===id.slice(1));if(l){numEl.textContent='נושא '+l.id;titleEl.textContent=l.title;}}
  document.querySelectorAll('.ns-item').forEach(it=>it.classList.toggle('active',it.dataset.t===id));
  closeNavSheet();
}

function buildNavSheet() {
  const list=document.getElementById('ns-list'); list.innerHTML='';
  const mkItem=(t,num,title,frac,cls='')=>{
    const div=document.createElement('div');
    div.className='ns-item'+(active===t?' active':'')+(cls?' '+cls:''); div.dataset.t=t;
    div.innerHTML=`<span class="ns-item-num">${num}</span><span class="ns-item-title">${title}</span>${frac?`<span class="ns-item-frac">${frac}</span>`:''}`;
    div.onclick=()=>setTab(t); list.appendChild(div);
  };
  mkItem('overview','','סקירה כללית','');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkItem(`l${l.id}`,l.id,l.title,'','sem-a'));
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    mkItem(`l${l.id}`,l.id,l.title,t?`${w}/${t}`:'');
  });
}

function buildTabs() {
  const bar=document.getElementById('tab-bar');
  const mkBtn=(t,num,title,frac='',cls='')=>{
    const b=document.createElement('button');
    b.className='tab-btn'+(t==='overview'?' active':'')+(cls?' '+cls:'');
    b.dataset.t=t;
    b.innerHTML=`<span class="tab-num">${num}</span><span class="tab-title">${title}</span>${frac?`<br><span class="tab-frac" data-l="${num}">${frac}</span>`:''}`;
    b.onclick=()=>setTab(t); bar.appendChild(b);
  };
  const mkD=()=>{const d=document.createElement('div');d.className='tab-divider';bar.appendChild(d);};
  const mkL=txt=>{const s=document.createElement('span');s.className='tab-sem-label';s.textContent=txt;bar.appendChild(s);};
  mkBtn('overview','','סקירה');
  mkD(); mkL('סמ׳ א');
  LESSONS.filter(l=>l.semester==='א').forEach(l=>mkBtn(`l${l.id}`,l.id,l.title,'','sem-a'));
  mkD(); mkL('סמ׳ ב');
  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length;
    mkBtn(`l${l.id}`,l.id,l.title,t?`${w}/${t}`:'');
  });
}

// ── Overview ──────────────────────────────────────────
function buildOverview() {
  const panel=document.createElement('div'); panel.className='panel active'; panel.dataset.p='overview';
  const allM=LESSONS.flatMap(mandatory).length;
  panel.innerHTML=`<div class="ov-header"><h2>הכנה למבחן</h2><p>${allM} סרטי חובה · ${LESSONS.filter(l=>!l.semester).length} נושאי סמ׳ ב · 2 נושאי סמ׳ א · מבחן 26.7</p></div>`;
  const grid=document.createElement('div'); grid.className='ov-grid';
  const decade={1:'1960',2:'1959-63',3:'1959-65',4:'1959-64',5:'1958-64',6:'1972-85',7:'1966-71'};

  LESSONS.filter(l=>l.semester==='א').forEach(l=>{
    const card=document.createElement('div'); card.className='ov-card sem-a'; card.dataset.l=l.id;
    card.innerHTML=`<div class="ov-num">נושא ${l.id} · סמ׳ א</div><div class="ov-title">${l.title}</div>${l.subtitle?`<div style="font-size:.46rem;color:#A08840;margin-bottom:5px">${l.subtitle}</div>`:''}`;
    card.onclick=()=>setTab(`l${l.id}`); grid.appendChild(card);
  });

  LESSONS.filter(l=>!l.semester).forEach(l=>{
    const w=watchedCount(l),t=mandatory(l).length,p=pctOf(w,t);
    const card=document.createElement('div'); card.className='ov-card'; card.dataset.l=l.id;
    const fh=mandatory(l).map(f=>`<span class="ov-film-m${fs(f.id).watched?' ov-film-done':''}" data-fid="${f.id}">${f.title.split('/')[0].trim()}</span>`).join('');
    card.innerHTML=`<div class="ov-num">נושא ${l.id} · ${decade[l.id]||''}</div><div class="ov-title">${l.title}</div><div class="ov-prog-row"><div class="ov-track"><div class="ov-fill${p===100?' full':''}" style="width:${p}%"></div></div><span class="ov-frac${p===100?' full':''}">${w}/${t}</span></div><div class="ov-films">${fh}</div>`;
    card.onclick=()=>setTab(`l${l.id}`); grid.appendChild(card);
  });

  panel.appendChild(grid); return panel;
}

// ── Lesson panel ──────────────────────────────────────
const HAGAR_MAP={1:['1'],2:['2','3'],3:['4','5'],4:['6','7'],5:[],6:['9'],7:['10','11']};
function getHagarParas(lid){return(HAGAR_MAP[lid]||[]).flatMap(k=>(SUMMARIES[k]||[]).slice(1));}

function buildLesson(l) {
  const panel=document.createElement('div'); panel.className='panel'; panel.dataset.p=`l${l.id}`;
  const w=watchedCount(l),t=mandatory(l).length;
  const hd=document.createElement('div'); hd.className='lesson-hd';
  hd.innerHTML=`<div class="l-num">נושא ${l.id}${l.semester?' · סמ׳ א':''}</div><h2>${l.title}</h2>${t?`<div class="l-frac"><b>${w}</b> / ${t} נצפו</div>`:''}`;
  panel.appendChild(hd);
  if(l.subtitle){const s=document.createElement('div');s.className='lesson-subtitle';s.textContent=l.subtitle;panel.appendChild(s);}

  const mandatoryFilms=l.films.filter(f=>f.mandatory);
  const clipFilms=l.films.filter(f=>!f.mandatory);

  function buildSection(title, films) {
    if(!films.length) return;
    const box=document.createElement('div'); box.className='sec-box';
    box.innerHTML=`<div class="sec-box-hd"><h3>${title}</h3></div>`;
    const body=document.createElement('div'); body.className='sec-box-body';
    const grid=document.createElement('div'); grid.className='film-grid';
    films.forEach(film=>buildFilmCard(film,grid,panel,l));
    body.appendChild(grid); box.appendChild(body); panel.appendChild(box);
  }

  buildSection('סרטי חובה', mandatoryFilms);
  buildSection('קטעים שהוקרנו בכיתה', clipFilms);
  return panel;
}

// ── Film card ──────────────────────────────────────────
function buildFilmCard(film, grid, panel, l) {
  const s=fs(film.id), card=document.createElement('div');
  card.className='fc'+(s.watched?' watched':'');
  const meta=[film.director,film.year,film.duration?film.duration+"′":null].filter(Boolean).join(' · ');
  const top=document.createElement('div'); top.className='fc-top';
  const check=document.createElement('button'); check.className='fc-check'; check.textContent=s.watched?'✓':'';
  const titleEl=document.createElement('div'); titleEl.className='fc-title'; titleEl.textContent=film.title;
  if(s.watched){titleEl.style.textDecoration='line-through';titleEl.style.color='var(--muted)';}
  check.onclick=()=>{
    const s2=fs(film.id); s2.watched=!s2.watched; save();
    card.classList.toggle('watched',s2.watched); check.textContent=s2.watched?'✓':'';
    titleEl.style.textDecoration=s2.watched?'line-through':''; titleEl.style.color=s2.watched?'var(--muted)':'';
    const frac=panel.querySelector('.l-frac');
    if(frac){const ww=watchedCount(l),tt=mandatory(l).length;frac.innerHTML=`<b>${ww}</b> / ${tt} נצפו`;}
    refreshProgress();
    if(s2.watched) showJoke(film.id);
  };
  const typeEl=document.createElement('span'); typeEl.className='fc-type '+(film.mandatory?'mandatory':'clip');
  typeEl.textContent=film.mandatory?'חובה':'(קטע)';
  top.appendChild(check); top.appendChild(typeEl); card.appendChild(top); card.appendChild(titleEl);
  if(meta){const m=document.createElement('div');m.className='fc-meta';m.textContent=meta;card.appendChild(m);}
  if(film.clips.length){
    const cd=document.createElement('div'); cd.className='fc-clips';
    film.clips.forEach((clip,i)=>{
      const cr=document.createElement('div'); cr.className='fc-clip-row'+(s.clips[i]?' done':'');
      const cb=document.createElement('button'); cb.className='fc-clip-box'; cb.textContent=s.clips[i]?'✓':'';
      cb.onclick=()=>{const s2=fs(film.id);s2.clips[i]=!s2.clips[i];save();cr.classList.toggle('done',!!s2.clips[i]);cb.textContent=s2.clips[i]?'✓':'';};
      const ct=document.createElement('span'); ct.className='fc-clip-txt'; ct.textContent=clip;
      cr.appendChild(cb); cr.appendChild(ct); cd.appendChild(cr);
    }); card.appendChild(cd);
  }
  grid.appendChild(card);
}
